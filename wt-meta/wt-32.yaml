  - url: https://github.com/git/git
    integration_type: reference_only
    rationale: "Content-addressable object database — canonical hash-as-id pattern"
  - url: https://github.com/ipfs/kubo
    integration_type: reference_only
    rationale: "CID + content addressing + dedup principles for R2 backend"
  - url: https://github.com/cloudflare/templates
    integration_type: reference_only
    rationale: "R2 worker binding patterns + multipart upload"
  - url: https://github.com/webdav-handler/webdav-handler
    integration_type: reference_only
    rationale: "Authorization scoping + metadata-vs-blob split design"
  - url: https://github.com/tus/tus-node-server
    integration_type: reference_only
    rationale: "Resumable upload protocol — deferred to Phase 5 optimization"


appId: com.rox.one
productName: ROX.ONE
copyright: Copyright © 2026 roxone
# CFBundleVersion is forced to a pure numeric Apple build number (T250).
# Bump on every notarization-eligible release; the marketing string lives in
# package.json `version` and maps to CFBundleShortVersionString automatically.
buildVersion: "92"

electronVersion: "39.8.9"

# Hook to compile macOS 26+ Liquid Glass icon after packaging
beforeBuild: scripts/beforeBuild.cjs
afterPack: scripts/afterPack.cjs
afterSign: scripts/afterSign.cjs

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  # Rox Design is copied to dist/resources for dev runtime, but packaged once from resources/rox-design below.
  - "!dist/resources/rox-design/**/*"
  - "!dist/renderer/src/**"
  - "!**/*.map"
  - package.json
  # Include bundled MCP servers (bridge + session) for Codex sessions
  - resources/bridge-mcp-server/**/*
  - resources/session-mcp-server/**/*
  # Include Pi agent server subprocess for Pi SDK sessions
  - resources/pi-agent-server/**/*
  # Future Rox Design packaged Open Design runtime/resources.
  - resources/rox-design/**/*
  # Note: Bundled assets (docs, themes, permissions, tool-icons) are in resources/
  # and copied to dist/resources/ by build:copy. They're included via dist/**/* above.
  # Include network interceptor for API error capture and MCP schema injection
  - packages/shared/src/unified-network-interceptor.ts
  - packages/shared/src/interceptor-common.ts
  - packages/shared/src/feature-flags.ts
  - packages/shared/src/interceptor-request-utils.ts
  # Include CLI tool Python scripts (platform-independent)
  - resources/scripts/**/*
  # Include CLI tool shell wrappers (platform-independent, both Unix and Windows)
  - resources/bin/markitdown
  - resources/bin/markitdown.cmd
  - resources/bin/pdf-tool
  - resources/bin/pdf-tool.cmd
  - resources/bin/xlsx-tool
  - resources/bin/xlsx-tool.cmd
  - resources/bin/doc-diff
  - resources/bin/doc-diff.cmd
  - resources/bin/img-tool
  - resources/bin/img-tool.cmd
  - resources/bin/docx-tool
  - resources/bin/docx-tool.cmd
  - resources/bin/pptx-tool
  - resources/bin/pptx-tool.cmd
  - resources/bin/ical-tool
  - resources/bin/ical-tool.cmd
  # Include bundled uv binary (platform-specific, only the relevant one ships per build)
  - resources/bin/darwin-arm64/**/*
  - resources/bin/darwin-x64/**/*
  - resources/bin/win32-x64/**/*
  - resources/bin/linux-x64/**/*
  # Include bundled Bun runtime (platform-specific, set by build script)
  - vendor/bun/**/*
  # Include bundled Codex binary (platform-specific, downloaded by build script)
  - vendor/codex/**/*
  # Include bundled Copilot CLI binary (platform-specific, copied from node_modules by build script)
  - vendor/copilot/**/*
  # Exclude everything from node_modules (will use extraResources for SDK)
  - "!node_modules/**/*"
  # B-H1 (PZD audit): re-include Rox Design's nested node_modules; the broad
  # node_modules exclusion above would otherwise drop better-sqlite3 + blake3-wasm.
  - resources/rox-design/**/node_modules/**/*

# Since SDK 0.2.113 the SDK ships a thin core (`@anthropic-ai/claude-agent-sdk`)
# and a per-platform optional dependency (`-darwin-arm64`, `-darwin-x64`, etc.)
# containing the ~210 MB native `claude` binary. We bundle both as extraResources
# below — only the binary matching the build target is shipped per artifact, so
# the platform `files` rules below also exclude the wrong-platform binaries.
#
# Why extraResources instead of `files`: since electron-builder v20.15.2,
# `node_modules` directories are auto-excluded from `files`. extraResources
# bypasses that. See: https://github.com/electron-userland/electron-builder/issues/3104
#
# Ripgrep is sourced from `@vscode/ripgrep` (was previously bundled inside the
# SDK as `vendor/ripgrep/<platform>/rg`; removed in 0.2.113).

extraMetadata:
  main: dist/main.cjs

# Auto-update: electron-updater fetches from this URL for update manifests (.yml files)
detectUpdateChannel: true
generateUpdatesFilesForAllChannels: true

publish:
  provider: generic
  url: https://app.rox.one/electron/stable/
  channel: latest

# Disable ASAR to avoid decompression overhead and click delays
asar: false

mac:
  category: public.app-category.productivity
  # Support floor: macOS Sonoma 14.0 and newer (Sonoma, Sequoia, Tahoe).
  # Ventura (13) and earlier are formally unsupported: GitHub Actions
  # deprecated the macos-13 hosted runner so we have no CI coverage for it,
  # and ad-hoc signed builds under hardened runtime exposed pre-Sonoma
  # bugs we do not have hardware to reproduce. Users on Ventura/Monterey
  # should pin to a build older than v1.0.2 or upgrade macOS.
  minimumSystemVersion: "14.0"
  icon: resources/icon.icns
  # Private/local RC builds intentionally use ad-hoc signing. electron-builder
  # only preserves hardened runtime for ad-hoc output when identity is "-";
  # disabling signing via null/CSC_IDENTITY_AUTO_DISCOVERY=false drops runtime.
  identity: "-"
  # macOS 26+ Liquid Glass: Tell macOS to look for icon in Assets.car
  # The value must match --app-icon used in actool (see afterPack.cjs)
  extendInfo:
    CFBundleIconName: icon
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extraResources:
    # Thin core SDK (sdk.mjs + types). ~4 MB — present on every platform.
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    # Stable alias pointing at the target-arch native binary package.
    # Populated by build-dmg.sh / build-linux.sh / build-win.ps1 before
    # electron-builder runs (`apps/electron/node_modules/@anthropic-ai/claude-agent-sdk-binary/`).
    # The runtime resolver (runtime-resolver.ts) looks here first.
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    # ripgrep (used by packages/server-core/src/services/search.ts).
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  # Exclude binaries for other platforms
  files:
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/win32-*/**"
    - "!**/resources/bin/linux-*/**"
  # Use predictable naming for macOS packages (applies to zip; dmg uses its own config below).
  #
  # CONTRACT: artifact filenames must match ^[A-Za-z0-9._-]+$ (no spaces, no
  # parens). The rox.one website + release-feed worker depend on these names
  # being URL-safe and stable across releases. Keep all four `artifactName:`
  # entries in this file consistent.
  artifactName: "ROX-ONE-${arch}.${ext}"
  # Code signing & notarization (disabled by default for local builds)
  # To enable: set CSC_LINK, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # notarize:
  #   teamId: ${APPLE_TEAM_ID}

dmg:
  # Use predictable naming: ROX-ONE-arm64.dmg, ROX-ONE-x64.dmg
  artifactName: "ROX-ONE-${arch}.dmg"
  # Custom background (multi-resolution TIFF with 1x+2x for retina support)
  background: resources/dmg-background.tiff
  # Use app icon as the mounted volume icon in Finder
  icon: resources/icon.icns
  iconSize: 80
  title: "ROX.ONE"
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Use predictable naming: ROX-ONE-x64.exe
  artifactName: "ROX-ONE-${arch}.${ext}"
  # Authenticode signing behavior:
  #   - Local dev builds: CSC_LINK env var unset; electron-builder skips signing
  #     and produces an unsigned exe (Gatekeeper-equivalent SmartScreen warns).
  #   - CI builds: multi-platform-on-merge.yml's "Prepare Windows self-signed
  #     cert" step (gated on WIN_SELF_SIGNED_CERT_PFX secret) writes the PFX to
  #     a temp file and exports CSC_LINK + CSC_KEY_PASSWORD to GITHUB_ENV.
  #     electron-builder then picks up those env vars and signs with SHA-256
  #     using the default signtool flow.
  # The previous explicit `signtoolOptions: { sign: null, signingHashAlgorithms: [] }`
  # actively BLOCKED signing — it forced electron-builder to ignore CSC_LINK and
  # emit an unsigned exe even when the cert was present. Removed so the default
  # env-driven flow takes effect (see PR #311 for the regression check that
  # caught this: Get-AuthenticodeSignature now runs on every Win build).
  files:
    # Exclude binaries for other platforms
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/linux-*/**"
    # WORKAROUND: Exclude bun, codex, copilot, and uv from regular files on Windows.
    # electron-builder's npm node module collector causes EBUSY errors when copying
    # .exe files because it scans/locks files while simultaneously trying to copy them.
    # Moving them to extraResources avoids this by copying before the collector runs.
    # See: https://github.com/electron-userland/electron-builder/issues/8250
    - "!vendor/bun/**/*"
    - "!vendor/codex/**/*"
    - "!vendor/copilot/**/*"
    - "!**/resources/bin/win32-x64/**"
  # Copy executables as extraResources to avoid EBUSY file locking (see comment above)
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: vendor/codex/win32-x64
      to: app/vendor/codex/win32-x64
    - from: vendor/copilot/win32-x64
      to: app/vendor/copilot/win32-x64
    - from: resources/bin/win32-x64
      to: app/resources/bin/win32-x64
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs

nsis:
  oneClick: true
  # Per-user install to %LOCALAPPDATA%\Programs\ (not Program Files).
  # Bun subprocess cannot read/write files in Program Files due to Windows permissions.
  perMachine: false
  deleteAppDataOnUninstall: true

linux:
  icon: resources/icon.png
  # T253: trust-boundary signing placeholder. Real gpg detached
  # signing is wired by `.github/workflows/linux-signed-release.yml`
  # (T255 follow-up). Local builds stay unsigned; CI swaps in the
  # real key id + sidecar via repo secrets. The afterPack-linux.cjs
  # hook (apps/electron/scripts/afterPack-linux.cjs) emits the
  # canonical (T253 linux boundary ok) marker.
  category: Office
  synopsis: "ROX.ONE Agent Workbench Suite"
  description: |
    ROX.ONE Agent Workbench Suite — local AI-agent desktop application
    for managing multi-agent workflows, prompt modes, and team workspaces.
  maintainer: "roxone <support@rox.one>"
  executableName: rox-one
  desktop:
    entry:
      Name: rox-one
      Categories: Office;Utility;Development;
      # Exec field removed — electron-builder 26.x sources executable
      # name from linux.executableName above (rox-one).
  # T253b: Add deb + rpm targets alongside AppImage for broad Linux
  # package-manager coverage. Both share the canonical category, synopsis,
  # and maintainer declared above.
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  artifactName: "ROX-ONE-${arch}.${ext}"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  # Exclude binaries for other platforms
  files:
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/win32-*/**"

# T253b: .deb package settings — system library dependencies and section.
deb:
  packageCategory: utils
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3
    - libsecret-1-0

# T253b: .rpm package settings — fpm overrides for Fedora/RHEL/openSUSE.
rpm:
  packageCategory: Applications/Office
  depends:
    - libnotify
    - libxtst
    - nss
    - libsecret

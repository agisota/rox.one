<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="14%" y1="8%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#040712"/>
      <stop offset="52%" stop-color="#091326"/>
      <stop offset="100%" stop-color="#18133E"/>
    </linearGradient>
    <radialGradient id="halo-cyan" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#8BEFFF" stop-opacity="0.42"/>
      <stop offset="44%" stop-color="#2DD4FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2DD4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo-violet" cx="34%" cy="56%" r="52%">
      <stop offset="0%" stop-color="#B7A6FF" stop-opacity="0.22"/>
      <stop offset="54%" stop-color="#7C6DFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C6DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gem-top" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F8FEFF"/>
      <stop offset="32%" stop-color="#DDF9FF"/>
      <stop offset="100%" stop-color="#5FDBFF"/>
    </linearGradient>
    <linearGradient id="gem-left" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B6F8FF"/>
      <stop offset="56%" stop-color="#25D8F0"/>
      <stop offset="100%" stop-color="#0D728D"/>
    </linearGradient>
    <linearGradient id="gem-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0E6FF"/>
      <stop offset="50%" stop-color="#7B88FF"/>
      <stop offset="100%" stop-color="#2A2F86"/>
    </linearGradient>
    <linearGradient id="gem-bottom" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A8ECFF"/>
      <stop offset="100%" stop-color="#113A63"/>
    </linearGradient>
    <linearGradient id="gem-core" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="38%" stop-color="#EAFBFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rim" x1="22%" y1="12%" x2="78%" y2="88%">
      <stop offset="0%" stop-color="#F6FDFF" stop-opacity="0.42"/>
      <stop offset="42%" stop-color="#9CEEFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-22%" width="160%" height="164%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.68"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feFlood flood-color="#42DBFF" flood-opacity="0.32" result="cyan"/>
      <feFlood flood-color="#7C6DFF" flood-opacity="0.14" result="violet"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.1" result="amber"/>
      <feComposite in="cyan" in2="b" operator="in" result="cg"/>
      <feComposite in="violet" in2="b" operator="in" result="vg"/>
      <feComposite in="amber" in2="b" operator="in" result="ag"/>
      <feMerge>
        <feMergeNode in="cg"/>
        <feMergeNode in="vg"/>
        <feMergeNode in="ag"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="300" height="300" rx="66" fill="url(#bg)"/>
  <circle cx="150" cy="146" r="116" fill="url(#halo-cyan)"/>
  <circle cx="128" cy="170" r="94" fill="url(#halo-violet)"/>

  <g filter="url(#shadow)">
    <ellipse cx="150" cy="192" rx="56" ry="16" fill="#020617" opacity="0.3"/>
    <g transform="translate(150 146)" filter="url(#glow)">
      <path d="M0 -108 L84 -24 L0 36 L-84 -24 Z" fill="url(#gem-top)"/>
      <path d="M-84 -24 L0 36 L-58 90 L-96 16 Z" fill="url(#gem-left)"/>
      <path d="M84 -24 L96 16 L58 90 L0 36 Z" fill="url(#gem-right)"/>
      <path d="M-58 90 L0 36 L58 90 L0 112 Z" fill="url(#gem-bottom)"/>
      <path d="M0 -86 L52 -28 L0 4 L-52 -28 Z" fill="url(#gem-core)" opacity="0.9"/>
    </g>
    <g transform="translate(150 146)">
      <path d="M0 -108 L84 -24 L0 36 L-84 -24 Z" fill="none" stroke="url(#rim)" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M-84 -24 L0 36 L-58 90 L-96 16 Z" fill="none" stroke="#71E8FF" stroke-opacity="0.16" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M84 -24 L96 16 L58 90 L0 36 Z" fill="none" stroke="#B5A8FF" stroke-opacity="0.16" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M-58 90 L0 36 L58 90 L0 112 Z" fill="none" stroke="#9EE7FF" stroke-opacity="0.14" stroke-width="1.3" stroke-linejoin="round"/>
      <path d="M0 -90 L56 -30 L0 6 L-56 -30 Z" fill="#FFFFFF" opacity="0.14"/>
      <path d="M0 -108 L-48 -54 L-20 -32 Z" fill="#FFFFFF" opacity="0.26"/>
      <path d="M48 -46 L78 -20 L60 -6 Z" fill="#FFFFFF" opacity="0.12"/>
      <circle cx="0" cy="-108" r="2.6" fill="#F8FDFF"/>
      <circle cx="84" cy="-24" r="1.9" fill="#FDE68A" opacity="0.74"/>
    </g>
  </g>
</svg>

# electron-builder.linux.yml
# Linux-specific build configuration extending electron-builder.yml.
# Adds DEB (Ubuntu/Debian) and RPM (Fedora/RHEL) targets alongside the
# existing AppImage. x64 only; ARM64 is out of scope.
#
# Usage (from apps/electron/):
#   bunx electron-builder --linux deb rpm AppImage --config electron-builder.linux.yml
#
# Or from the workspace root via the helper script:
#   bun run electron:build:linux

extends: electron-builder.yml

linux:
  icon: resources/icon.png
  category: Development
  synopsis: "ROX.ONE Agent Workbench Suite"
  description: |
    ROX.ONE Agent Workbench Suite — local AI-agent desktop application
    for managing multi-agent workflows, prompt modes, and team workspaces.
  maintainer: "roxone <support@rox.one>"
  vendor: "roxone"
  executableName: rox-one
  desktop:
    entry:
      Name: rox-one
      Categories: Development;Office;Utility;
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  artifactName: "ROX-ONE-${arch}.${ext}"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  files:
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/win32-*/**"

# DEB package: system library dependencies for Ubuntu/Debian.
# Covers GTK3, libnotify, NSS, libsecret, X11 extensions needed by Electron.
# Uses OR-dep syntax for t64 transitional libs (Ubuntu 24.04+) while
# remaining compatible with Debian 12 / Ubuntu 22.04 which use pre-t64 names.
# gconf2/gconf-service removed: dropped from Ubuntu 24.04 and not needed by
# modern Electron (chromium dropped GConf support years ago).
deb:
  packageCategory: utils
  depends:
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4
    - libnss3
    - libsecret-1-0
    - libxtst6
    - libxss1
    - libgbm1
    - libasound2 | libasound2t64
    - libappindicator3-1

# RPM package: equivalent Fedora/RHEL/openSUSE library names.
rpm:
  packageCategory: Applications/Development
  depends:
    - gtk3
    - libnotify
    - nss
    - libsecret
    - libXtst
    - libXScrnSaver
    - mesa-libgbm
    - alsa-lib
    - GConf2
    - libappindicator-gtk3

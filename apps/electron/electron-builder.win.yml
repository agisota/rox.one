# Windows Authenticode signing overlay for electron-builder.
#
# This file is used ONLY by the win-sign-smoke.yml workflow and the
# electron:build:win package.json script. It EXTENDS the base
# electron-builder.yml by overriding `win.signtoolOptions` to enable
# Authenticode signing when WIN_CSC_LINK is available, and falls back to
# unsigned when the secret is absent (PR smoke runs with a self-signed cert
# generated by scripts/win-codesign.ts).
#
# DO NOT modify apps/electron/electron-builder.yml for Windows signing —
# only this overlay file should carry signing config.
#
# Secret wiring (required for real Authenticode):
#   WIN_CSC_LINK          — base64-encoded .pfx / .p12 certificate
#   WIN_CSC_KEY_PASSWORD  — password protecting the certificate
#
# The scripts/win-codesign.ts script reads those env vars, writes the pfx to
# a temp file, and re-exports CSC_LINK / CSC_KEY_PASSWORD (electron-builder's
# native env var names) so electron-builder picks them up transparently.

extends: electron-builder.yml

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: "ROX-ONE-${arch}.${ext}"
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    publisherName: "roxone"
  files:
    # Exclude binaries for other platforms
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/linux-*/**"
    # WORKAROUND: Exclude bun, codex, copilot, and uv from regular files on Windows.
    - "!vendor/bun/**/*"
    - "!vendor/codex/**/*"
    - "!vendor/copilot/**/*"
    - "!**/resources/bin/win32-x64/**"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
    - from: node_modules/@anthropic-ai/claude-agent-sdk-binary
      to: app/node_modules/@anthropic-ai/claude-agent-sdk-binary
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: vendor/codex/win32-x64
      to: app/vendor/codex/win32-x64
    - from: vendor/copilot/win32-x64
      to: app/vendor/copilot/win32-x64
    - from: resources/bin/win32-x64
      to: app/resources/bin/win32-x64
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs

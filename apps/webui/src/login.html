<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="ROX.ONE" />
    <title>ROX.ONE</title>
    <style>
      :root {
        --bg: #f6f0e8;
        --ink: #191713;
        --muted: #756c60;
        --line: rgba(25, 23, 19, 0.12);
        --card: rgba(255, 252, 246, 0.86);
        --accent: #165f4d;
        --accent-2: #c77d36;
        --danger: #a93628;
        --success: #165f4d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 18%, rgba(199, 125, 54, 0.24), transparent 30%),
          radial-gradient(circle at 88% 8%, rgba(22, 95, 77, 0.20), transparent 28%),
          linear-gradient(135deg, #fbf5ea 0%, var(--bg) 48%, #efe1cf 100%);
        display: grid;
        place-items: center;
        padding: 28px;
      }
      .shell { width: min(100%, 460px); }
      .brand { margin-bottom: 24px; letter-spacing: -0.04em; }
      .brand h1 { margin: 0; font-size: 58px; line-height: .9; font-weight: 800; }
      .brand p { margin: 12px 0 0; color: var(--muted); font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .card {
        border: 1px solid var(--line);
        background: var(--card);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 70px rgba(25, 23, 19, 0.14);
        border-radius: 28px;
        padding: 22px;
      }
      .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
      .tabs.two { grid-template-columns: repeat(2, 1fr); }
      .tab {
        border: 1px solid transparent;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.46);
        color: var(--muted);
        cursor: pointer;
        font: 700 13px/1 ui-sans-serif, system-ui, sans-serif;
        padding: 11px 10px;
      }
      .tab.active { background: var(--ink); color: #fffaf1; }
      .panel { display: none; }
      .panel.active { display: block; animation: rise .22s ease-out; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      label { display: block; margin: 14px 0 7px; color: var(--muted); font: 700 12px/1 ui-sans-serif, system-ui, sans-serif; text-transform: uppercase; letter-spacing: .08em; }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
        font: 16px/1.2 ui-sans-serif, system-ui, sans-serif;
        padding: 14px 15px;
        outline: none;
      }
      input:focus { border-color: rgba(22, 95, 77, 0.55); box-shadow: 0 0 0 4px rgba(22, 95, 77, 0.12); }
      button.submit {
        width: 100%;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--accent), #0f4237);
        color: white;
        cursor: pointer;
        font: 800 15px/1 ui-sans-serif, system-ui, sans-serif;
        margin-top: 18px;
        padding: 15px 16px;
      }
      button.submit.secondary { background: linear-gradient(135deg, var(--accent-2), #9f5520); }
      button.link {
        border: 0;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        font: 700 13px/1.45 ui-sans-serif, system-ui, sans-serif;
        padding: 0;
      }
      .hint, .error, .notice { margin: 14px 2px 0; font: 13px/1.45 ui-sans-serif, system-ui, sans-serif; }
      .hint { color: var(--muted); }
      .error { color: var(--danger); min-height: 19px; }
      .notice { color: var(--success); min-height: 19px; }
      .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-top: 12px; }
      .hidden { display: none !important; }
      @media (max-width: 520px) { body { padding: 18px; } .brand h1 { font-size: 46px; } .card { border-radius: 22px; padding: 18px; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="brand">
        <h1>ROX ONE</h1>
        <p id="brand-copy">Войдите в аккаунт или зарегистрируйтесь, чтобы открыть рабочее пространство.</p>
      </section>
      <section class="card">
        <div class="tabs" role="tablist" id="tabs">
          <button class="tab active" data-tab="login" type="button">Вход</button>
          <button class="tab" data-tab="register" type="button">Регистрация</button>
          <button class="tab" data-tab="token" type="button" id="token-tab">Токен</button>
        </div>

        <form class="panel active" id="login-form">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required />
          <label for="login-password">Пароль</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />
          <button class="submit" type="submit">Войти</button>
          <div class="row">
            <button class="link" type="button" data-tab="reset-request">Забыли пароль?</button>
            <button class="link" type="button" id="resend-verification">Отправить подтверждение</button>
          </div>
        </form>

        <form class="panel" id="register-form">
          <label for="register-name">Имя</label>
          <input id="register-name" name="displayName" type="text" autocomplete="name" />
          <label for="register-email">Email</label>
          <input id="register-email" name="email" type="email" autocomplete="email" required />
          <label for="register-password">Пароль</label>
          <input id="register-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
          <button class="submit" type="submit">Создать аккаунт</button>
          <p class="hint">Мы отправим письмо для подтверждения email. До подтверждения вход в приложение закрыт.</p>
        </form>

        <form class="panel" id="reset-request-form">
          <label for="reset-email">Email</label>
          <input id="reset-email" name="email" type="email" autocomplete="email" required />
          <button class="submit" type="submit">Отправить ссылку сброса</button>
          <p class="hint">Если аккаунт существует, письмо придет на этот email.</p>
        </form>

        <form class="panel" id="reset-confirm-form">
          <label for="reset-password">Новый пароль</label>
          <input id="reset-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
          <button class="submit" type="submit">Сохранить новый пароль</button>
        </form>

        <form class="panel" id="token-form">
          <label for="legacy-password">Ключ доступа WebUI</label>
          <input id="legacy-password" name="password" type="password" autocomplete="current-password" required />
          <button class="submit secondary" type="submit">Войти по токену</button>
          <p class="hint">Fallback для локального и старого WebUI режима без внешней БД.</p>
        </form>

        <div id="notice" class="notice" role="status" aria-live="polite"></div>
        <div id="error" class="error" role="alert" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const errorEl = document.getElementById('error')
      const noticeEl = document.getElementById('notice')
      const tabsWrap = document.getElementById('tabs')
      const tabs = document.querySelectorAll('.tab')
      const panels = document.querySelectorAll('.panel')
      const tokenTab = document.getElementById('token-tab')
      const params = new URLSearchParams(window.location.search)
      const resetToken = params.get('token')
      const remoteAuth = (() => {
        const scheme = params.get('scheme')
        const state = params.get('state')
        return scheme && state ? { scheme, state } : null
      })()

      function clearMessages() {
        errorEl.textContent = ''
        noticeEl.textContent = ''
      }

      function showTab(name) {
        clearMessages()
        tabs.forEach((item) => item.classList.toggle('active', item.dataset.tab === name))
        panels.forEach((panel) => panel.classList.toggle('active', panel.id === `${name}-form`))
      }

      tabs.forEach((tab) => tab.addEventListener('click', () => showTab(tab.dataset.tab)))
      document.querySelectorAll('[data-tab]').forEach((item) => {
        item.addEventListener('click', () => showTab(item.dataset.tab))
      })

      async function submitJson(path, payload) {
        clearMessages()
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(payload),
        })
        let body = null
        try { body = await res.json() } catch {}
        if (!res.ok) {
          throw new Error(body?.error?.message || body?.error || 'Запрос не выполнен')
        }
        return body || { ok: true }
      }

      function withRemoteAuth(payload) {
        return remoteAuth ? { ...payload, desktopAuth: remoteAuth } : payload
      }

      function finishInteractiveAuth(body) {
        if (body?.desktopRedirectUrl) {
          window.location.href = body.desktopRedirectUrl
          return
        }
        window.location.href = '/account'
      }

      async function loadAuthMode() {
        try {
          const res = await fetch('/api/auth/mode', { credentials: 'same-origin' })
          if (!res.ok) return
          const mode = await res.json()
          authMode = mode.mode === 'legacy' ? 'legacy' : 'account'
          if (authMode === 'legacy') {
            document.querySelector('[data-tab="login"]')?.classList.add('hidden')
            document.querySelector('[data-tab="register"]')?.classList.add('hidden')
            tokenTab.classList.remove('hidden')
            document.getElementById('brand-copy').textContent = 'Введите токен доступа ROX ONE для этого сервера.'
            showTab('token')
            return
          }
          if (mode.mode === 'account') {
            tokenTab.classList.add('hidden')
            tabsWrap.classList.add('two')
            document.getElementById('brand-copy').textContent = remoteAuth
              ? 'Войдите в ROX ONE, чтобы завершить подключение приложения Rox.'
              : 'Войдите в аккаунт ROX ONE или создайте новый аккаунт.'
          }
          if (!mode.signupEnabled) {
            document.querySelector('[data-tab="register"]').classList.add('hidden')
            tabsWrap.classList.remove('two')
          }
        } catch {}
      }

      let authMode = 'account'
      if (params.get('verified') === 'invalid') errorEl.textContent = 'Ссылка подтверждения недействительна или истекла.'
      if (params.get('verified') === 'missing') errorEl.textContent = 'Ссылка подтверждения неполная.'

      const requestedTab = params.get('tab') || params.get('mode')
      if (['login', 'register', 'token', 'reset-request', 'reset-confirm'].includes(requestedTab)) {
        showTab(requestedTab)
      }
      if (window.location.pathname === '/signup/remote') showTab('register')
      if (window.location.pathname === '/login/remote') showTab('login')
      if (remoteAuth) {
        document.getElementById('brand-copy').textContent = 'Войдите в ROX ONE, чтобы завершить подключение приложения Rox.'
      }

      if (window.location.pathname.startsWith('/reset-password')) {
        showTab('reset-confirm')
      }
      loadAuthMode()

      document.getElementById('login-form').addEventListener('submit', async (event) => {
        event.preventDefault()
        const form = new FormData(event.currentTarget)
        try {
          if (authMode === 'legacy') {
            await submitJson('/api/auth', { password: form.get('password') })
            window.location.href = '/'
            return
          }
          const body = await submitJson('/api/auth/login', withRemoteAuth({
            email: form.get('email'),
            password: form.get('password'),
          }))
          finishInteractiveAuth(body)
        } catch (error) {
          errorEl.textContent = error.message
        }
      })

      document.getElementById('register-form').addEventListener('submit', async (event) => {
        event.preventDefault()
        const form = new FormData(event.currentTarget)
        try {
          await submitJson('/api/auth/register', withRemoteAuth({
            displayName: form.get('displayName'),
            email: form.get('email'),
            password: form.get('password'),
          }))
          showTab('login')
          noticeEl.textContent = remoteAuth
            ? 'Аккаунт создан. Подтвердите email — после подтверждения Rox откроется автоматически.'
            : 'Аккаунт создан. Проверьте email и откройте ссылку подтверждения.'
        } catch (error) {
          errorEl.textContent = error.message
        }
      })

      document.getElementById('reset-request-form').addEventListener('submit', async (event) => {
        event.preventDefault()
        const form = new FormData(event.currentTarget)
        try {
          await submitJson('/api/auth/password-reset/request', { email: form.get('email') })
          showTab('login')
          noticeEl.textContent = 'Если аккаунт существует, мы отправили письмо для сброса пароля.'
        } catch (error) {
          errorEl.textContent = error.message
        }
      })

      document.getElementById('reset-confirm-form').addEventListener('submit', async (event) => {
        event.preventDefault()
        const form = new FormData(event.currentTarget)
        try {
          await submitJson('/api/auth/password-reset/confirm', {
            token: resetToken,
            newPassword: form.get('password'),
          })
          window.location.href = '/account'
        } catch (error) {
          errorEl.textContent = error.message
        }
      })

      document.getElementById('resend-verification').addEventListener('click', async () => {
        try {
          const email = document.getElementById('login-email').value
          await submitJson('/api/auth/verify-email/resend', { email })
          noticeEl.textContent = 'Если аккаунт ожидает подтверждения, мы отправили новое письмо.'
        } catch (error) {
          errorEl.textContent = error.message
        }
      })

      document.getElementById('token-form').addEventListener('submit', async (event) => {
        event.preventDefault()
        const form = new FormData(event.currentTarget)
        try {
          await submitJson('/api/auth', { password: form.get('password') })
          window.location.href = '/'
        } catch (error) {
          errorEl.textContent = error.message
        }
      })
    </script>
  </body>
</html>

name: Rox Design xvfb Packaged Smoke (PZD-59)

# Verifies that the RoxDesignRuntimeManager startup markers appear in the diag
# log when the Linux AppImage is launched under a virtual framebuffer (xvfb).
#
# Also runs the AAP loop harness test (PZD-18 step 5) which validates the
# emitter → router → IPC bridge leg without requiring xvfb or a packaged app.
#
# Triggers:
#   - pull_request: path-filtered to rox-design source + resources + this workflow
#   - push to main (always)

on:
  pull_request:
    paths:
      - 'apps/electron/src/main/rox-design-*.ts'
      - 'apps/electron/src/main/agent-answer-router.ts'
      - 'apps/electron/src/main/__tests__/aap-loop.smoke.test.ts'
      - 'packages/server-core/src/sessions/agent-answer-emitter.ts'
      - 'packages/agent-contract/src/**'
      - 'apps/electron/resources/rox-design/**'
      - '.github/workflows/rox-design-xvfb-smoke.yml'
  push:
    branches:
      - main

concurrency:
  group: rox-design-xvfb-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  aap-loop-harness:
    name: AAP loop harness smoke (PZD-18 step 5)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bun install --frozen-lockfile

      - name: Run AAP loop harness test
        run: bun test apps/electron/src/main/__tests__/aap-loop.smoke.test.ts

  xvfb-smoke:
    name: Rox Design xvfb smoke — AppImage
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      ROX_HEADLESS: "1"
      ROX_DIAG: "1"
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install xvfb, ImageMagick, and unzip
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y xvfb x11-apps imagemagick libfuse2 unzip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Rox Design runtime payload
        shell: bash
        run: |
          set -euo pipefail
          OPEN_DESIGN_VERSION="0.7.0"
          OPEN_DESIGN_TAG="open-design-v${OPEN_DESIGN_VERSION}"
          OPEN_DESIGN_ASSET="open-design-${OPEN_DESIGN_VERSION}-mac-arm64.zip"
          OPEN_DESIGN_RELEASE="https://github.com/nexu-io/open-design/releases/download/${OPEN_DESIGN_TAG}"

          curl -fsSLo "/tmp/${OPEN_DESIGN_ASSET}" "${OPEN_DESIGN_RELEASE}/${OPEN_DESIGN_ASSET}"
          curl -fsSLo "/tmp/${OPEN_DESIGN_ASSET}.sha256" "${OPEN_DESIGN_RELEASE}/${OPEN_DESIGN_ASSET}.sha256"
          (cd /tmp && shasum -a 256 -c "${OPEN_DESIGN_ASSET}.sha256")

          rm -rf /tmp/open-design-runtime
          mkdir -p /tmp/open-design-runtime
          unzip -q "/tmp/${OPEN_DESIGN_ASSET}" -d /tmp/open-design-runtime

          OPEN_DESIGN_RESOURCES="$(find /tmp/open-design-runtime -type d -path '*/Open Design.app/Contents/Resources' | head -n 1)"
          if [ -z "$OPEN_DESIGN_RESOURCES" ]; then
            echo "Open Design.app/Contents/Resources not found in ${OPEN_DESIGN_ASSET}"
            find /tmp/open-design-runtime -maxdepth 4 -type d | sort | head -80
            exit 1
          fi

          ROX_DESIGN_SOURCE_RESOURCES="${OPEN_DESIGN_RESOURCES}" \
            bun run rox-design:prepare -- --force
          bun run rox-design:payload:verify

      - name: Build Linux AppImage
        shell: bash
        run: |
          set -euo pipefail
          bun run electron:build:linux 2>&1 | tee /tmp/rox-design-build.log

      - name: Launch AppImage under xvfb and capture diag log
        shell: bash
        run: |
          set -euo pipefail

          APPIMAGE=$(find apps/electron/release -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "ERROR: no AppImage found under apps/electron/release"
            find apps/electron/release -maxdepth 3 | head -30
            exit 1
          fi
          echo "Found AppImage: $APPIMAGE"
          chmod +x "$APPIMAGE"

          SMOKE_LOG=/tmp/rox-design-smoke.log
          rm -f "$SMOKE_LOG"
          touch "$SMOKE_LOG"

          # Launch under xvfb for up to 60 seconds, writing stdout+stderr to the
          # smoke log so RoxDesignRuntimeManager markers are captured.
          set +e
          xvfb-run -a timeout 60 \
            "$APPIMAGE" --appimage-extract-and-run \
            2>&1 | tee "$SMOKE_LOG" || true
          set -e

          echo "=== Smoke log (last 80 lines) ==="
          tail -n 80 "$SMOKE_LOG" || true

      - name: Assert RoxDesignRuntimeManager init markers present
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_LOG=/tmp/rox-design-smoke.log

          if ! grep -q "RoxDesignRuntimeManager initialized" "$SMOKE_LOG"; then
            echo "FAIL: RoxDesignRuntimeManager initialized marker not found in $SMOKE_LOG"
            echo "=== Full smoke log ==="
            cat "$SMOKE_LOG" || echo "(empty)"
            exit 1
          fi
          echo "PASS: RoxDesignRuntimeManager initialized marker found in diag log"

      - name: Capture xvfb screenshot
        if: always()
        shell: bash
        run: |
          set +e
          DISPLAY_NUM=$(cat /tmp/.xvfb-run-*/display 2>/dev/null | head -1 || echo ":99")
          xwd -root -display "$DISPLAY_NUM" -out /tmp/rox-design-smoke-xvfb.xwd 2>/dev/null || true
          if [ -s /tmp/rox-design-smoke-xvfb.xwd ]; then
            convert /tmp/rox-design-smoke-xvfb.xwd /tmp/rox-design-smoke-xvfb.png 2>/dev/null || true
          fi
          set -e

      - name: Upload rox-design smoke artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-design-smoke-${{ github.run_id }}
          path: |
            /tmp/rox-design-smoke.log
            /tmp/rox-design-build.log
            /tmp/rox-design-smoke-xvfb.png
          retention-days: 14
          if-no-files-found: warn

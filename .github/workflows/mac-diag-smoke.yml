name: Mac White-Window Diag Smoke

# Diagnostic workflow to capture per-OS screenshots and diag logs for the
# macOS white-window regression (Sequoia / Sonoma).
#
# Triggers:
#   - workflow_dispatch: manual dispatch from the Actions tab
#   - push to branches matching fix/multiplatform-mac-* (auto-run on fix branches)
#
# Auto matrix: macos-14 (Sonoma), macos-15 (Sequoia).
# Ventura (macos-13) is intentionally not in the push matrix: GitHub-hosted
# macos-13 jobs can remain queued without allocating a runner, which blocks PRs
# without producing launch evidence. Use a VM/self-hosted Ventura runner for exact
# Ventura GUI proof if needed.
# Artefacts: per-OS screenshot + diag.log + DiagnosticReports uploaded always.

on:
  workflow_dispatch:
  push:
    branches:
      - "fix/multiplatform-mac-*"

concurrency:
  group: mac-diag-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  diag-smoke:
    name: Diag smoke — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ROX_DEV_RUNTIME: "1"
      ROX_DIAG: "1"
      # ROX_HEADLESS intentionally NOT set. The runtime treats it as
      # `!!process.env.ROX_HEADLESS`, which makes ANY non-empty string truthy
      # — including the string "0". Setting `ROX_HEADLESS: "0"` here in YAML
      # would force the app into headless mode and skip createInitialWindows(),
      # which is exactly the false-hang we chased through iter 5-6.
      # Leaving it unset (env-var absent) = !!undefined = false = window mode.
      # @vscode/ripgrep downloads from GitHub Releases during postinstall;
      # authenticate to avoid unauthenticated API 403/rate-limit failures on macOS runners.
      GITHUB_TOKEN: ${{ github.token }}
      # Exercise the impending GitHub Actions Node 24 runtime before it becomes default.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch nested dep symlink for electron-builder
        shell: bash
        run: |
          set -euo pipefail
          # electron-builder is invoked from apps/electron (working-directory below), so patch
          # that package's node_modules. BunNodeModulesCollector fails to resolve @anthropic-ai/sdk
          # (hoisted by bun to workspace root) when traversing @anthropic-ai/claude-agent-sdk deps.
          # Use absolute symlink target to avoid miscounting relative ../ levels.
          NESTED_DIR=apps/electron/node_modules/@anthropic-ai/claude-agent-sdk/node_modules/@anthropic-ai
          SDK_ABS="${GITHUB_WORKSPACE}/node_modules/@anthropic-ai/sdk"
          mkdir -p "$NESTED_DIR"
          if [ ! -e "$NESTED_DIR/sdk" ]; then
            ln -sf "$SDK_ABS" "$NESTED_DIR/sdk"
            echo "Created symlink: $NESTED_DIR/sdk -> $SDK_ABS"
          else
            echo "Symlink already exists at $NESTED_DIR/sdk"
          fi

      - name: Build Electron app
        run: bun run electron:build

      - name: Package macOS app (dir output for smoke launch)
        shell: bash
        working-directory: apps/electron
        run: |
          set -o pipefail
          bunx electron-builder --mac --arm64 --x64 --dir --publish=never \
            2>&1 | tee /tmp/electron-builder-${{ matrix.os }}.log

      - name: Install Playwright (ad-hoc, isolated tree)
        shell: bash
        run: |
          set -euo pipefail
          # @playwright/test is not a project dependency; install it ad-hoc into
          # /tmp/pw so the diag launch script (placed in the same dir) can resolve
          # the import. Avoids polluting the workspace lockfile.
          mkdir -p /tmp/pw
          cd /tmp/pw
          npm init -y >/dev/null
          npm install --no-fund --no-audit --silent @playwright/test@^1.48
          npx --yes playwright install chromium

      - name: Inspect codesign + Gatekeeper assessment of built app
        if: always()
        shell: bash
        env:
          OS_LABEL: ${{ matrix.os }}
        run: |
          set +e
          # Prefer arm64 build on Apple-silicon runners. The original alphabetic
          # `find | head -1` selected release/mac/ (x86_64), which executes under
          # Rosetta on macos-14/15-xlarge (both arm64) and hangs silently under
          # ad-hoc hardened runtime — see iterations 1-5 of this workflow.
          HOST_ARCH=$(uname -m)
          if [ "$HOST_ARCH" = "arm64" ] && [ -d "apps/electron/release/mac-arm64/ROX.ONE.app" ]; then
            APP_PATH="apps/electron/release/mac-arm64/ROX.ONE.app"
          elif [ -d "apps/electron/release/mac/ROX.ONE.app" ]; then
            APP_PATH="apps/electron/release/mac/ROX.ONE.app"
          else
            APP_PATH=$(find apps/electron/release -name "ROX.ONE.app" | head -1)
          fi
          echo "Host arch=$HOST_ARCH, selected APP_PATH=$APP_PATH"
          {
            echo "=== APP_PATH: $APP_PATH ==="
            echo
            echo "=== codesign -dvvv ==="
            codesign -dvvv "$APP_PATH" 2>&1
            echo
            echo "=== codesign --display --entitlements :- ==="
            codesign --display --entitlements :- "$APP_PATH" 2>&1
            echo
            echo "=== spctl -a -vvv -t exec ==="
            spctl -a -vvv -t exec "$APP_PATH" 2>&1
            echo
            echo "=== exe permissions ==="
            ls -la "$APP_PATH/Contents/MacOS/" 2>&1
          } | tee /tmp/diag-${OS_LABEL}-codesign.log

      - name: Launch app and capture screenshot + diag log
        shell: bash
        env:
          ROX_DIAG: "1"
          ROX_SMOKE_EXIT_ON_READY: "0"
          OS_LABEL: ${{ matrix.os }}
        run: |
          set -euo pipefail

          # Locate the built .app (prefer arm64, fall back to x64)
          # Prefer arm64 build on Apple-silicon runners. The original alphabetic
          # `find | head -1` selected release/mac/ (x86_64), which executes under
          # Rosetta on macos-14/15-xlarge (both arm64) and hangs silently under
          # ad-hoc hardened runtime — see iterations 1-5 of this workflow.
          HOST_ARCH=$(uname -m)
          if [ "$HOST_ARCH" = "arm64" ] && [ -d "apps/electron/release/mac-arm64/ROX.ONE.app" ]; then
            APP_PATH="apps/electron/release/mac-arm64/ROX.ONE.app"
          elif [ -d "apps/electron/release/mac/ROX.ONE.app" ]; then
            APP_PATH="apps/electron/release/mac/ROX.ONE.app"
          else
            APP_PATH=$(find apps/electron/release -name "ROX.ONE.app" | head -1)
          fi
          echo "Host arch=$HOST_ARCH, selected APP_PATH=$APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ROX.ONE.app in apps/electron/release"
            find apps/electron/release -type d | head -20
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # Script lives inside /tmp/pw so node resolves @playwright/test from
          # /tmp/pw/node_modules (installed in the previous step).
          cat > /tmp/pw/diag-launch.mjs << 'PLAYWRIGHT_SCRIPT'
          import { _electron as electron } from '@playwright/test'
          import { join } from 'path'
          import { createWriteStream } from 'fs'

          const appPath = process.env.ROX_APP_PATH
          const screenshotPath = process.env.ROX_SCREENSHOT_PATH
          const stderrLogPath = process.env.ROX_STDERR_LOG
          const stdoutLogPath = process.env.ROX_STDOUT_LOG
          console.log('Launching app:', appPath)
          console.log('stderr capture →', stderrLogPath)
          console.log('stdout capture →', stdoutLogPath)

          // M.18 white-window diag: 90 s launch timeout (was 30 s) — child
          // processes spawned during init can stretch wall-clock past 30 s
          // when shell-env.ts shells out to login zsh on a fresh runner.
          const electronApp = await electron.launch({
            executablePath: join(appPath, 'Contents/MacOS/ROX.ONE'),
            env: {
              ...process.env,
              ROX_DIAG: '1',
              ROX_SMOKE_EXIT_ON_READY: '0',
              ROX_STARTUP_LOG_PATH: process.env.ROX_STARTUP_LOG_PATH,
            },
            timeout: 90000,
          })

          // Pipe the spawned Electron process stdio to dedicated log files so
          // ROX_STARTUP: stderr markers survive even if firstWindow() times out.
          const childProc = electronApp.process()
          if (childProc?.stderr) {
            const s = createWriteStream(stderrLogPath, { flags: 'a' })
            childProc.stderr.pipe(s)
            childProc.stderr.on('data', d => process.stderr.write(`[app-stderr] ${d}`))
          }
          if (childProc?.stdout) {
            const s = createWriteStream(stdoutLogPath, { flags: 'a' })
            childProc.stdout.pipe(s)
            childProc.stdout.on('data', d => process.stdout.write(`[app-stdout] ${d}`))
          }

          // Wait for first window
          let page
          try {
            page = await electronApp.firstWindow({ timeout: 60000 })
            console.log('First window URL:', page.url())
          } catch (err) {
            console.error('firstWindow() failed:', err.message)
            try { await electronApp.close() } catch {}
            process.exit(1)
          }

          // Wait 10 s for the renderer to paint
          await new Promise(resolve => setTimeout(resolve, 10000))

          await page.screenshot({ path: screenshotPath, fullPage: true })
          console.log('Screenshot saved to:', screenshotPath)
          console.log('Page title:', await page.title(), '| URL:', page.url())

          await electronApp.close()
          PLAYWRIGHT_SCRIPT

          # M.18 white-window diag: also expose ROX_STARTUP_LOG_PATH so the
          # main process appends a per-stage marker line to disk (path
          # survives Playwright stderr-piping limitations on macOS runners).
          STARTUP_LOG="/tmp/diag-${OS_LABEL}-rox-startup.log"
          rm -f "$STARTUP_LOG"

          set +e
          ROX_APP_PATH="$APP_PATH" \
          ROX_SCREENSHOT_PATH="/tmp/diag-${OS_LABEL}.png" \
          ROX_STDERR_LOG="/tmp/diag-${OS_LABEL}-stderr.log" \
          ROX_STDOUT_LOG="/tmp/diag-${OS_LABEL}-stdout.log" \
          ROX_STARTUP_LOG_PATH="$STARTUP_LOG" \
            node /tmp/pw/diag-launch.mjs
          NODE_RC=$?
          set -e

          echo "=== ROX_STARTUP markers (disk) ==="
          cat "$STARTUP_LOG" 2>/dev/null || echo "(no startup log)"
          echo "=== stderr log (first 200 lines) ==="
          head -n 200 "/tmp/diag-${OS_LABEL}-stderr.log" 2>/dev/null || echo "(no stderr log)"
          echo "=== stdout log (first 80 lines) ==="
          head -n 80 "/tmp/diag-${OS_LABEL}-stdout.log" 2>/dev/null || echo "(no stdout log)"

          if [ "$NODE_RC" -ne 0 ]; then
            echo "ERROR: Playwright launch script exited with code $NODE_RC"
            exit "$NODE_RC"
          fi

          # Hard assertion: the screenshot MUST exist and be non-trivially sized.
          # Without this, a silently broken Playwright run would still mark the
          # job green (see prior incident with @playwright/test missing).
          if [ ! -s "/tmp/diag-${OS_LABEL}.png" ]; then
            echo "ERROR: screenshot /tmp/diag-${OS_LABEL}.png missing or empty"
            exit 1
          fi
          SIZE=$(stat -f%z "/tmp/diag-${OS_LABEL}.png" 2>/dev/null || stat -c%s "/tmp/diag-${OS_LABEL}.png")
          echo "Screenshot size: $SIZE bytes"
          # Bumped floor from 2000 to 5000 bytes per M.18 fix scope: an all-white
          # window encodes to ~2-3 KB PNG. A real-rendered UI on retina runners is
          # ≥ ~50 KB. Keeps the assertion meaningful as evidence of UI render.
          if [ "$SIZE" -lt 5000 ]; then
            echo "ERROR: screenshot suspiciously small ($SIZE bytes) — likely all-white"
            exit 1
          fi

      - name: Copy diag.log from app logs dir
        if: always()
        shell: bash
        env:
          OS_LABEL: ${{ matrix.os }}
        run: |
          LOG_DIR=~/Library/Logs/ROX.ONE
          if [ -d "$LOG_DIR" ]; then
            cp "$LOG_DIR/diag.log" "/tmp/diag-${OS_LABEL}.log" 2>/dev/null || true
            echo "Copied diag.log from $LOG_DIR"
          else
            echo "No diag log dir at $LOG_DIR — listing ~/Library/Logs/:"
            ls ~/Library/Logs/ 2>/dev/null || true
          fi

      - name: Upload diag artefacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: diag-${{ matrix.os }}
          path: |
            /tmp/diag-${{ matrix.os }}.png
            /tmp/diag-${{ matrix.os }}.log
            /tmp/diag-${{ matrix.os }}-stderr.log
            /tmp/diag-${{ matrix.os }}-stdout.log
            /tmp/diag-${{ matrix.os }}-codesign.log
            /tmp/diag-${{ matrix.os }}-rox-startup.log
            /tmp/electron-builder-${{ matrix.os }}.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload DiagnosticReports (crash logs)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crash-reports-${{ matrix.os }}
          path: ~/Library/Logs/DiagnosticReports/
          if-no-files-found: ignore
          retention-days: 14

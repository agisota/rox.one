name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Prepare validation logs
        run: mkdir -p .ci-logs

      - name: validate:rebrand gate (R.10 permanent)
        shell: bash
        run: |
          set -o pipefail
          bun run validate:rebrand 2>&1 | tee .ci-logs/validate-rebrand.log

      - name: Run validation suite
        shell: bash
        run: |
          set -o pipefail
          bun run validate:agent-contract 2>&1 | tee .ci-logs/agent-contract.log
          bun run validate:architecture-docs 2>&1 | tee .ci-logs/architecture-docs.log
          bun run validate:ci 2>&1 | tee .ci-logs/validate-ci.log
          bun run test:units 2>&1 | tee .ci-logs/test-units.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: .ci-logs/**/*.log
          if-no-files-found: warn

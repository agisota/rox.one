name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Prepare validation logs
        run: mkdir -p .ci-logs

      - name: validate:rebrand gate (R.10 permanent)
        shell: bash
        run: |
          set -o pipefail
          bun run validate:rebrand 2>&1 | tee .ci-logs/validate-rebrand.log

      - name: Run validation suite
        shell: bash
        run: |
          set -o pipefail
          bun run validate:agent-contract 2>&1 | tee .ci-logs/agent-contract.log
          bun run validate:architecture-docs 2>&1 | tee .ci-logs/architecture-docs.log
          bun run validate:ci 2>&1 | tee .ci-logs/validate-ci.log
          bun run validate:workflow-pins 2>&1 | tee .ci-logs/validate-workflow-pins.log
          bun test --timeout=30000 scripts/__tests__/validate-packaged-artifacts.test.ts 2>&1 | tee .ci-logs/test-packaged-artifacts.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: validation-logs
          path: .ci-logs/**/*.log
          if-no-files-found: warn

name: Mac ARM Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/mac-arm-build.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'apps/online-docs/**'
      - 'apps/marketing/**'
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mac-arm-build.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'apps/online-docs/**'
      - 'apps/marketing/**'

concurrency:
  group: mac-arm-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mac-arm-build:
    name: ROX ONE macOS ARM64 package
    runs-on: macos-15-xlarge
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ROX_DEV_RUNTIME: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Cache bun store
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Electron prebuilt binaries
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ${{ env.LOCALAPPDATA }}/electron/Cache
          key: electron-39.8.9-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            electron-39.8.9-${{ runner.os }}-

      - name: Cache Vite/tsc build output
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            apps/electron/dist/.vite-cache
            apps/electron/.vite
            packages/**/.tsbuildinfo
            apps/**/.tsbuildinfo
          key: build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/electron/src/**', 'packages/*/src/**', 'apps/electron/vite.config.ts') }}
          restore-keys: |
            build-${{ runner.os }}-${{ runner.arch }}-

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Mac ARM workflow contract
        run: bun run validate:mac-arm-build-workflow

      - name: Typecheck all packages
        run: bun run typecheck:all

      - name: Check i18n parity
        run: bun run lint:i18n:parity

      - name: Build Electron app
        run: bun run electron:build

      - name: Package ROX ONE for macOS ARM64
        run: bun run electron:dist:dev:mac:arm64

      - name: Smoke packaged ROX ONE app
        run: bun run electron:smoke:packaged:mac

      - name: Smoke Electron startup path
        run: bun run electron:smoke

      - name: Validate packaged artifact metadata
        env:
          ROX_ARTIFACT_PLATFORM: mac
        run: bun run validate:packaged-artifacts

      - name: Validate private mac release trust boundary
        run: bun run validate:mac-private-release-boundary

      - name: Upload Mac ARM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-mac-arm64
          path: |
            apps/electron/release/ROX-ONE-arm64.dmg
            apps/electron/release/ROX-ONE-arm64.zip
            apps/electron/release/mac-arm64/ROX.ONE.app
          if-no-files-found: error

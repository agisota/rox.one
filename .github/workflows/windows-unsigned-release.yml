name: Windows Unsigned Release

# M.18 T502: unsigned-beta Windows NSIS installer workflow.
#
# UNSIGNED BETA STATUS
# ~~~~~~~~~~~~~~~~~~~~
# This workflow produces an Authenticode-unsigned .exe. Windows SmartScreen
# will display an "Unknown publisher" warning on first install. This is
# intentional for v1.0.0-rc.2; end-users must click "Run anyway" to proceed.
#
# v1.0.x migration path to signed builds
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# When a Windows code-signing certificate is procured ($200-500/year from
# DigiCert or Sectigo), the following additional steps are required:
#   1. Encode the .p12 / .pfx as base64 and store as secret CSC_LINK.
#   2. Store the certificate password as secret CSC_KEY_PASSWORD.
#   3. In electron-builder.yml `win.signtoolOptions`, set:
#        signingHashAlgorithms: ["sha256"]
#        publisherName: "Your Company Name"
#   4. Wire the secrets into the electron-builder step via env vars.
#   5. Create a new workflow (windows-signed-release.yml) mirroring this
#      one but with signing enabled, and retire this unsigned workflow.
#
# Trigger model: workflow_dispatch only. Unsigned artifacts are produced on
# demand for a named release tag; never on push or PR to avoid accidental
# distribution of development builds.
#
# Untrusted-input safety: `inputs.tag` is only ever fed to a shell via the
# INPUT_TAG env var (never via inline GitHub expression interpolation), and
# only after a strict regex check. All other shell consumers of input values
# follow the same env-var pattern.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (required, must match v[0-9]+.[0-9]+.[0-9]+(-rc.[0-9]+)?)"
        required: true
        type: string

concurrency:
  group: windows-unsigned-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  windows-unsigned-release:
    name: ROX ONE Windows unsigned NSIS installer
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      ROX_HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # Tag-protection guard. The dispatch input is untrusted, so it is fed
      # via env (never inline) and pattern-validated before any later step
      # references it. This blocks injection payloads in the tag and also
      # stops accidental runs against non-release refs.
      - name: Validate release tag pattern
        shell: pwsh
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $candidate = $env:INPUT_TAG -replace '^refs/tags/', ''
          Write-Host "Candidate release tag: $candidate"
          if ($candidate -notmatch '^v\d+\.\d+\.\d+(-rc\.\d+)?$') {
            Write-Error "release tag '$candidate' does not match v[0-9]+.[0-9]+.[0-9]+(-rc.[0-9]+)?"
            exit 1
          }
          "RELEASE_TAG=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Checkout validated release tag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git fetch --force --tags origin "refs/tags/$env:RELEASE_TAG"
          git checkout --force "refs/tags/$env:RELEASE_TAG"
          $actual = git describe --tags --exact-match HEAD
          if ($actual -ne $env:RELEASE_TAG) {
            Write-Error "checked out tag '$actual' does not match validated release tag '$env:RELEASE_TAG'"
            exit 1
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      # uv is required to run Python-based CLI tools (markitdown, pdf-tool,
      # xlsx-tool, docx-tool, pptx-tool, ical-tool, img-tool, doc-diff)
      # bundled into the Electron app via resources/bin/*.cmd wrappers.
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare unsigned-release logs
        run: New-Item -ItemType Directory -Force -Path .ci-logs\windows-unsigned-release | Out-Null
        shell: pwsh

      - name: Validate Windows boundary fixtures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          bun run validate:windows-boundary-fixtures *>&1 | Tee-Object -FilePath .ci-logs\windows-unsigned-release\windows-boundary-fixtures.log

      # Build renderer + main using the Windows-specific build script which
      # omits the macOS .env source that is unavailable on Windows runners.
      # The build:win script lives in apps/electron/package.json — set
      # working-directory accordingly.
      - name: Build Electron app (Windows)
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bun run build:win *>&1 | Tee-Object -FilePath ..\..\.ci-logs\windows-unsigned-release\electron-build.log

      # Package with electron-builder for Windows x64 NSIS installer.
      # --publish=never prevents upload to the generic update server; the
      # workflow artifact upload below handles distribution.
      # No signing env vars are set -- this is intentionally unsigned for
      # the v1.0.0-rc.2 beta distribution (SmartScreen will warn on install).
      - name: Package Windows NSIS installer (unsigned)
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bunx electron-builder --win --x64 --publish=never *>&1 | Tee-Object -FilePath ..\..\.ci-logs\windows-unsigned-release\electron-builder.log

      - name: Validate Windows unsigned-release boundary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          bun run validate:windows-private-release-boundary *>&1 | Tee-Object -FilePath .ci-logs\windows-unsigned-release\windows-private-release-boundary.log

      # Compute SHA-256 checksums using PowerShell Get-FileHash (no coreutils
      # dependency; standard on all Windows runners).
      - name: Compute artifact checksums (SHA-256)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outFile = '.ci-logs\windows-unsigned-release\release-checksums.txt'
          $lines = @()
          $lines += "# ROX.ONE Windows unsigned release $env:RELEASE_TAG SHA-256 checksums"
          $lines += "# generated at $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)"
          $releaseDir = 'apps\electron\release'
          $required = @(
            'ROX-ONE-x64.exe',
            'ROX-ONE-x64.exe.blockmap',
            'latest.yml'
          )
          foreach ($name in $required) {
            $path = Join-Path $releaseDir $name
            if (-not (Test-Path -LiteralPath $path)) {
              Write-Error "missing required Windows release artifact: $path"
              exit 1
            }
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLower()
            $lines += "$hash  $name"
          }
          $lines | Out-File -FilePath $outFile -Encoding utf8
          Get-Content $outFile

      # T508: Generate CycloneDX SBOM after build, before artifact upload.
      # cdxgen -t bun resolves the bun.lock dependency graph. The pinned
      # transient npx install avoids @latest drift without adding a production
      # dependency. The SBOM is validated before upload, then uploaded as a
      # long-lived workflow artifact (90 days) so it can be attached to a
      # release or submitted to a dependency-tracking system.
      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          npx -y @cyclonedx/cdxgen@12.4.0 -t bun -o sbom-windows.json
          bun run scripts/validate-sbom.ts sbom-windows.json
          echo "SBOM generated: $(wc -c < sbom-windows.json) bytes"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-windows
          path: sbom-windows.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload Windows installer artifact
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-unsigned-win-x64
          path: |
            apps/electron/release/ROX-ONE-x64.exe
            apps/electron/release/ROX-ONE-x64.exe.blockmap
            apps/electron/release/latest.yml
            .ci-logs/windows-unsigned-release/release-checksums.txt
          retention-days: 14
          if-no-files-found: error

      - name: Upload unsigned-release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-windows-unsigned-release-evidence
          path: |
            .ci-logs/windows-unsigned-release/**/*.log
            .ci-logs/windows-unsigned-release/release-checksums.txt
          retention-days: 14
          if-no-files-found: warn

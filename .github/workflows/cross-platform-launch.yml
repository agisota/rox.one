name: Cross Platform Launch Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/cross-platform-launch.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cross-platform-launch.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"

concurrency:
  group: cross-platform-launch-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-sequoia-launch:
    name: macOS Sequoia ARM64 packaged launch
    runs-on: macos-15-xlarge
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ROX_DEV_RUNTIME: "1"
      ROX_ARTIFACT_PLATFORM: mac
      ROX_ARTIFACT_ARCH: arm64
      ROX_RC_MODE: unsigned

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate cross-platform launch workflow contract
        run: bun run validate:cross-platform-launch-workflow

      - name: Build Electron app
        run: bun run electron:build

      - name: Package ROX.ONE for macOS ARM64
        run: bun run electron:dist:dev:mac:arm64

      - name: Smoke packaged ROX.ONE app
        run: bun run electron:smoke:packaged

      - name: Validate packaged artifact metadata
        run: bun run validate:packaged-artifacts

      - name: Upload macOS launch evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-cross-platform-launch-macos-sequoia
          path: |
            apps/electron/release/ROX-ONE-arm64.dmg
            apps/electron/release/ROX-ONE-arm64.zip
            apps/electron/release/mac-arm64/ROX.ONE.app/Contents/Info.plist
          retention-days: 14
          if-no-files-found: warn

  linux-ubuntu-launch:
    name: Linux Ubuntu packaged launch (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04
    env:
      ROX_HEADLESS: "1"
      ROX_ARTIFACT_PLATFORM: linux
      ROX_LINUX_ARCH: x86_64
      ROX_LINUX_DEB_RPM: "true"
      ROX_RC_MODE: unsigned

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install Linux launch libraries
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          ASOUND_PKG="libasound2"
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ASOUND_PKG="libasound2t64"
          fi
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            libxss1 \
            libnotify4 \
            libsecret-1-0 \
            libxtst6 \
            "$ASOUND_PKG"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate launcher + workflow contracts
        run: |
          bun run validate:cross-platform-launch-workflow
          bun run validate:linux-installer-launcher

      - name: Build Electron app
        run: bun run electron:build

      - name: Package Linux unpacked app for launch smoke
        shell: bash
        run: |
          set -euo pipefail
          cd apps/electron
          bunx electron-builder --linux dir --x64 --publish=never

      - name: Smoke packaged ROX.ONE app under Xvfb
        run: bun run electron:smoke:packaged

      - name: Package Linux AppImage + deb + rpm for artifact metadata
        shell: bash
        run: |
          set -euo pipefail
          cd apps/electron
          bunx electron-builder --linux --x64 --publish=never

      - name: Validate packaged artifact metadata
        run: bun run validate:packaged-artifacts

      - name: Upload Linux launch evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-cross-platform-launch-${{ matrix.runner }}
          path: |
            apps/electron/release/linux-unpacked/rox-one
            apps/electron/release/*.AppImage
            apps/electron/release/*.deb
            apps/electron/release/*.rpm
          retention-days: 14
          if-no-files-found: warn

  windows-launch:
    name: Windows packaged launch (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-latest
          - windows-2022
    env:
      ROX_HEADLESS: "1"
      ROX_ARTIFACT_PLATFORM: windows
      ROX_ARTIFACT_ARCH: x64
      ROX_RC_MODE: unsigned

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate cross-platform launch workflow contract
        run: bun run validate:cross-platform-launch-workflow

      - name: Build Electron app (Windows)
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bun run build:win
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package Windows unpacked app for launch smoke
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bunx electron-builder --win --x64 --dir --publish=never
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke packaged ROX.ONE app
        run: bun run electron:smoke:packaged

      - name: Package Windows NSIS installer for artifact metadata
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bunx electron-builder --win --x64 --publish=never
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate packaged artifact metadata
        run: bun run validate:packaged-artifacts

      - name: Upload Windows launch evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-cross-platform-launch-${{ matrix.runner }}
          path: |
            apps/electron/release/win-unpacked/ROX.ONE.exe
            apps/electron/release/*.exe
            apps/electron/release/*.blockmap
            apps/electron/release/*.yml
          retention-days: 14
          if-no-files-found: warn

  linux-distro-launcher-guards:
    name: Linux installer launcher guard (${{ matrix.distro }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:12
          - distro: fedora
            image: fedora:40
          - distro: nixos
            image: nixos/nix

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate launcher tokens inside distro container
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          DISTRO: ${{ matrix.distro }}
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo:ro" "$IMAGE" /bin/sh -lc '
            set -eu
            test -f /repo/scripts/install-app.sh
            grep -q 'ROX-ONE-x64.AppImage' /repo/scripts/install-app.sh
            grep -q -- '--no-sandbox' /repo/scripts/install-app.sh
            grep -q "appimage-run" /repo/scripts/install-app.sh
            grep -q "sudo apt install fuse libfuse2" /repo/scripts/install-app.sh
            grep -q "sudo dnf install fuse fuse-libs" /repo/scripts/install-app.sh
            grep -q "nix profile install nixpkgs#appimage-run" /repo/scripts/install-app.sh
          '
          echo "launcher guard ok for $DISTRO ($IMAGE)"

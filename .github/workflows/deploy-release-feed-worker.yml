name: Deploy release-feed worker

# Auto-deploys infra/cloudflare/rox-one-release-feed.worker.ts to Cloudflare
# whenever the worker code, its tests, or its wrangler example config change
# on main. Also runnable manually via workflow_dispatch.
#
# Gated on the CLOUDFLARE_API_TOKEN secret: if it's not present (e.g. in a
# forked PR), the job exits with a clear warning rather than attempting an
# anonymous deploy. To activate:
#   1. Generate a Cloudflare API token with scope:
#        Account: Workers Scripts (Edit)
#        Account: Account Settings (Read)
#        Zone:    rox.one (Workers Routes: Edit)
#   2. Add it to repo secrets as CLOUDFLARE_API_TOKEN.
#   3. Add CLOUDFLARE_ACCOUNT_ID as a repo VARIABLE (not secret — public).
#   4. Push any worker-relevant change to main, or run via workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - "infra/cloudflare/rox-one-release-feed.worker.ts"
      - "infra/cloudflare/wrangler.rox-one-release-feed.example.toml"
      - "infra/__tests__/rox-one-release-feed-worker.test.ts"
      - ".github/workflows/deploy-release-feed-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-release-feed-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (secrets present?)
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.gate.outputs.can_deploy }}
    steps:
      - name: Check CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
        id: gate
        shell: bash
        env:
          HAVE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          HAVE_ACCOUNT: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          if [ "$HAVE_TOKEN" = "true" ] && [ "$HAVE_ACCOUNT" = "true" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy preflight passed."
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: set CLOUDFLARE_API_TOKEN secret and CLOUDFLARE_ACCOUNT_ID variable. See workflow header for scope details."
          fi

  test:
    name: Worker tests
    needs: preflight
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run worker tests
        run: bun test infra/__tests__/rox-one-release-feed-worker.test.ts

  deploy:
    name: wrangler deploy
    needs: [preflight, test]
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Render wrangler config from the example — keeps the deployed config
      # version-controlled while letting the example file stay token-free.
      - name: Render wrangler config
        run: |
          cp infra/cloudflare/wrangler.rox-one-release-feed.example.toml \
             infra/cloudflare/wrangler.rox-one-release-feed.toml

      - name: Deploy via wrangler
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"
          command: deploy --config infra/cloudflare/wrangler.rox-one-release-feed.toml
        env:
          # GITHUB_RELEASE_TOKEN is provisioned out-of-band via `wrangler secret
          # put` against the worker — not from this workflow. Setting it here
          # would only override; we leave it to the existing worker secret.
          NODE_ENV: production

      - name: Smoke check manifest
        shell: bash
        run: |
          set -euo pipefail
          # Worker has a 60s cache TTL; give it a moment to swap.
          sleep 30
          for attempt in 1 2 3; do
            body=$(curl -fsS https://app.rox.one/electron/latest/manifest.json || echo '{}')
            if echo "$body" | jq -e '.version, .binaries' >/dev/null 2>&1; then
              echo "::notice::Live manifest reachable: $(echo "$body" | jq -r .version)"
              echo "$body" | jq '{version, binaries: (.binaries|keys)}'
              exit 0
            fi
            echo "Attempt $attempt: manifest not ready, retrying..."
            sleep 20
          done
          echo "::warning::Manifest not reachable after deploy. Check Cloudflare dashboard."

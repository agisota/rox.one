name: E2E Core Scenarios

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/e2e-core.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/e2e-core-scenarios.ts"
      - "scripts/validate-e2e-core-scenarios.ts"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/e2e-core.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/e2e-core-scenarios.ts"
      - "scripts/validate-e2e-core-scenarios.ts"
      - "package.json"
      - "bun.lock"

concurrency:
  group: e2e-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-core:
    name: ROX ONE core scenario suite
    runs-on: macos-15
    timeout-minutes: 45
    env:
      ROX_E2E_FAKE_PROVIDERS: "1"
      ROX_HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          # Authenticated GitHub API for @vscode/ripgrep postinstall.
          # Unauthenticated requests hit the public 60 req/hour limit and
          # return 403 on the ripgrep release download.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate E2E core contract
        run: bun run validate:e2e-core-scenarios

      - name: Run E2E core scenarios
        run: bun run e2e:core

      - name: Upload E2E logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: e2e-core-logs
          path: .e2e-logs
          if-no-files-found: ignore

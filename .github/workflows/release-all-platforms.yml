name: Release All Platforms

# Unified release workflow: builds Mac ARM64 + Linux x64 + Windows x64 in
# parallel on a version tag push (or manual dispatch), then publishes all
# artifacts to a draft GitHub release for the tag.
#
# Idempotency: softprops/action-gh-release is idempotent on tag_name — the
# first matrix job to finish creates the draft release; each subsequent job
# appends its artifacts to the same release object. No coordination job is
# needed between matrix jobs.
#
# Signing status (v1.0.0-rc.2 baseline, UNSIGNED across all platforms):
#   Mac   — CSC_IDENTITY_AUTO_DISCOVERY=false. Gatekeeper will warn on open;
#            notarization requires CSC_LINK + APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD
#            + APPLE_TEAM_ID. Wire those secrets and lift the notarize block
#            from mac-signed-release.yml in a follow-up.
#   Linux — GPG signing is skipped. To add it, lift the "GPG sign AppImage"
#            block from linux-signed-release.yml and wire the three
#            ROX_LINUX_GPG_KEY / ROX_LINUX_GPG_KEY_ID / ROX_LINUX_GPG_PASSPHRASE
#            secrets in a follow-up.
#   Win   — Authenticode signing is skipped (SmartScreen will warn on install).
#            To add it, wire CSC_LINK + CSC_KEY_PASSWORD and update
#            electron-builder.yml signtoolOptions in a follow-up.
#
# Per-platform ad-hoc workflows (mac-unsigned-release.yml, linux-signed-release.yml,
# windows-unsigned-release.yml, mac-signed-release.yml) are NOT modified and
# remain available for targeted reruns / signed rebuilds.
#
# Untrusted-input safety: workflow_dispatch `tag` input is always fed to bash
# via an env var (DISPATCH_TAG / INPUT_TAG), never via inline ${{ }} interpolation
# in a run: block. The tag is regex-validated before any shell consumer uses it.
# Matrix values (platform names) are static workflow strings, not external input,
# but are also passed through env: vars in run: blocks for consistency.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0-rc.2). Defaults to the current ref when empty."
        required: false
        type: string

# Releases must NEVER be cancelled mid-flight — a partial release would leave
# an incomplete set of assets on GitHub. cancel-in-progress: false is
# intentional and load-bearing.
concurrency:
  group: release-all-platforms-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # required by softprops/action-gh-release to create/update releases

jobs:
  build-and-release:
    name: "ROX ONE ${{ matrix.platform }} release"
    timeout-minutes: 90
    strategy:
      # Allow all three platform jobs to run even if one fails — partial
      # releases are better than no release when only one platform regresses.
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            runs-on: macos-15-xlarge
          - platform: linux-x64
            runs-on: ubuntu-latest
          - platform: windows-x64
            runs-on: windows-latest

    runs-on: ${{ matrix.runs-on }}

    env:
      ROX_HEADLESS: "1"

    steps:
      # -----------------------------------------------------------------------
      # 1. Resolve and validate the release tag
      # -----------------------------------------------------------------------
      - name: Resolve release tag
        id: resolve-tag
        # On tag push github.ref_name is already the tag (e.g. v1.0.0-rc.2).
        # On workflow_dispatch, use the optional input or fall back to ref_name.
        # Both DISPATCH_TAG and REF_NAME are passed through env vars — never
        # inlined into the run: script body — to avoid injection attacks.
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_TAG}" ]; then
            CANDIDATE="${DISPATCH_TAG#refs/tags/}"
          else
            CANDIDATE="${REF_NAME#refs/tags/}"
          fi
          echo "Resolved candidate tag: ${CANDIDATE}"
          if [[ ! "${CANDIDATE}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "::error::release tag '${CANDIDATE}' does not match v[0-9]+.[0-9]+.[0-9]+(-rc.[0-9]+)?"
            exit 1
          fi
          echo "RELEASE_TAG=${CANDIDATE}" >> "$GITHUB_ENV"
          echo "tag=${CANDIDATE}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 2. Checkout the exact tag's code
      # -----------------------------------------------------------------------
      - name: Checkout tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Checkout the validated tag — NOT the default branch — so the build
          # always reflects the exact tagged commit.
          ref: ${{ steps.resolve-tag.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      # -----------------------------------------------------------------------
      # 3. Toolchain setup (common across all three platforms)
      # -----------------------------------------------------------------------
      - name: Setup Bun 1.3.11
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      # uv is required for the Python-based CLI helpers bundled into the app
      # (markitdown, pdf-tool, xlsx-tool, docx-tool, pptx-tool, ical-tool,
      # img-tool, doc-diff) via resources/bin/*.cmd wrappers.
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install dependencies
        # GITHUB_TOKEN is required by the @vscode/ripgrep postinstall script,
        # which fetches a prebuilt binary from api.github.com. Without auth,
        # the request hits the IP-shared 60/hr unauthenticated rate limit
        # and returns 403, breaking install on tag-storm runs (we saw this
        # at rc.6 after 3 tag pushes inside 30 minutes). Authenticated quota
        # is 5000/hr per token.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      # -----------------------------------------------------------------------
      # 4. Platform-specific log directory
      # -----------------------------------------------------------------------
      - name: Prepare CI log directory (Unix)
        if: matrix.platform != 'windows-x64'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: mkdir -p ".ci-logs/release-all-platforms/${PLATFORM}"

      - name: Prepare CI log directory (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path ".ci-logs\release-all-platforms\windows-x64" | Out-Null

      # -----------------------------------------------------------------------
      # 5. Typecheck
      # -----------------------------------------------------------------------

      # Mac and Linux: run the full cross-package typecheck (bash-based script)
      - name: Typecheck all packages (Mac / Linux)
        if: matrix.platform == 'mac-arm64' || matrix.platform == 'linux-x64'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -o pipefail
          bun run typecheck:all 2>&1 | tee ".ci-logs/release-all-platforms/${PLATFORM}/typecheck.log"

      # Windows: typecheck:all uses bash cd-chaining which is unavailable on
      # Windows runners. Run the Electron app typecheck directly instead.
      - name: Typecheck Electron app (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bun run typecheck *>&1 | Tee-Object -FilePath "..\..\.ci-logs\release-all-platforms\windows-x64\typecheck.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      # 6. i18n parity check (Unix only — the underlying script uses bash)
      # -----------------------------------------------------------------------
      - name: Check i18n parity (Mac / Linux)
        if: matrix.platform == 'mac-arm64' || matrix.platform == 'linux-x64'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -o pipefail
          bun run lint:i18n:parity 2>&1 | tee ".ci-logs/release-all-platforms/${PLATFORM}/i18n-parity.log"

      # -----------------------------------------------------------------------
      # 7. Build Electron app (platform-specific build commands)
      # -----------------------------------------------------------------------

      # Mac and Linux: use the root-level electron:build script which sources
      # .env (gracefully) and builds main + preload + renderer + resources.
      - name: Build Electron app (Mac / Linux)
        if: matrix.platform == 'mac-arm64' || matrix.platform == 'linux-x64'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -o pipefail
          bun run electron:build 2>&1 | tee ".ci-logs/release-all-platforms/${PLATFORM}/electron-build.log"

      # Windows: use build:win from the apps/electron working-directory. This
      # script omits the macOS .env `source` that is unavailable on Windows
      # runners and avoids PowerShell syntax incompatibilities.
      - name: Build Electron app (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bun run build:win *>&1 | Tee-Object -FilePath "..\..\.ci-logs\release-all-platforms\windows-x64\electron-build.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      # 8. Package with electron-builder (platform-specific)
      # -----------------------------------------------------------------------

      # Mac ARM64: use the dedicated dist:dev:mac:arm64 script which internally
      # sets CSC_IDENTITY_AUTO_DISCOVERY=false and ROX_DEV_RUNTIME=1 and
      # delegates to scripts/electron-dist-dev-mac-arm64.ts.
      - name: Package macOS ARM64 DMG (unsigned)
        if: matrix.platform == 'mac-arm64'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ROX_DEV_RUNTIME: "1"
        shell: bash
        run: |
          set -o pipefail
          bun run electron:dist:dev:mac:arm64 2>&1 | tee .ci-logs/release-all-platforms/mac-arm64/electron-builder.log

      # Linux x64: run electron-builder directly from apps/electron (same as
      # linux-signed-release.yml). GPG signing is intentionally absent here —
      # to add it, lift the "GPG sign AppImage" block from
      # linux-signed-release.yml and wire the ROX_LINUX_GPG_KEY secrets.
      - name: Package Linux x64 AppImage + deb + rpm (unsigned)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          set -o pipefail
          cd apps/electron
          bunx electron-builder --linux --publish=never 2>&1 | tee ../../.ci-logs/release-all-platforms/linux-x64/electron-builder.log

      # Windows x64: run electron-builder from apps/electron working-directory.
      # No signing env vars are set — intentionally unsigned for rc.2 baseline.
      - name: Package Windows x64 NSIS installer (unsigned)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        working-directory: apps/electron
        run: |
          $ErrorActionPreference = 'Stop'
          bunx electron-builder --win --x64 --publish=never *>&1 | Tee-Object -FilePath "..\..\.ci-logs\release-all-platforms\windows-x64\electron-builder.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      # 9. Smoke + validate steps (mirrors mac-arm-build.yml)
      # -----------------------------------------------------------------------

      - name: Smoke packaged ROX ONE app (Mac only)
        if: matrix.platform == 'mac-arm64'
        shell: bash
        run: |
          set -o pipefail
          bun run electron:smoke:packaged:mac 2>&1 | tee .ci-logs/release-all-platforms/mac-arm64/smoke-packaged.log

      - name: Smoke Electron startup path (Mac only)
        if: matrix.platform == 'mac-arm64'
        shell: bash
        run: |
          set -o pipefail
          bun run electron:smoke 2>&1 | tee .ci-logs/release-all-platforms/mac-arm64/smoke-startup.log

      - name: Validate packaged artifact metadata (Mac)
        if: matrix.platform == 'mac-arm64'
        shell: bash
        env:
          ROX_RC_MODE: "unsigned"
          ROX_ARTIFACT_PLATFORM: "mac"
          ROX_ARTIFACT_ARCH: "arm64"
        run: |
          set -o pipefail
          bun run validate:packaged-artifacts 2>&1 | tee .ci-logs/release-all-platforms/mac-arm64/validate-packaged-artifacts.log

      - name: Validate packaged artifact metadata (Linux)
        if: matrix.platform == 'linux-x64'
        shell: bash
        env:
          ROX_RC_MODE: "unsigned"
          ROX_ARTIFACT_PLATFORM: "linux"
          ROX_LINUX_ARCH: "x86_64"
          ROX_LINUX_DEB_RPM: "true"
        run: |
          set -o pipefail
          bun run validate:packaged-artifacts 2>&1 | tee .ci-logs/release-all-platforms/linux-x64/validate-packaged-artifacts.log

      - name: Validate packaged artifact metadata (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        env:
          ROX_RC_MODE: "unsigned"
          ROX_ARTIFACT_PLATFORM: "windows"
          ROX_ARTIFACT_ARCH: "x64"
        run: |
          $ErrorActionPreference = 'Stop'
          bun run validate:packaged-artifacts *>&1 | Tee-Object -FilePath ".ci-logs\release-all-platforms\windows-x64\validate-packaged-artifacts.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate Mac private release trust boundary
        if: matrix.platform == 'mac-arm64'
        shell: bash
        run: |
          set -o pipefail
          bun run validate:mac-private-release-boundary 2>&1 | tee .ci-logs/release-all-platforms/mac-arm64/validate-mac-private-release-boundary.log

      - name: Validate Linux private release trust boundary
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          set -o pipefail
          bun run validate:linux-private-release-boundary 2>&1 | tee .ci-logs/release-all-platforms/linux-x64/validate-linux-private-release-boundary.log

      - name: Validate Windows private release trust boundary
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          bun run validate:windows-private-release-boundary *>&1 | Tee-Object -FilePath ".ci-logs\release-all-platforms\windows-x64\validate-windows-private-release-boundary.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      # 10. Compute checksums
      # -----------------------------------------------------------------------

      - name: Compute artifact checksums (Mac / Linux)
        if: matrix.platform == 'mac-arm64' || matrix.platform == 'linux-x64'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          OUT=".ci-logs/release-all-platforms/${PLATFORM}/release-checksums.txt"
          {
            echo "# ROX.ONE ${PLATFORM} release ${RELEASE_TAG} SHA-256 checksums"
            echo "# generated at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# WARNING: artifacts are NOT code-signed (rc.2 unsigned baseline)"
          } > "${OUT}"
          find apps/electron/release -maxdepth 2 \
            \( -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
            -exec shasum -a 256 {} \; >> "${OUT}"
          cat "${OUT}"

      - name: Compute artifact checksums (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        env:
          RELEASE_TAG_VAR: ${{ env.RELEASE_TAG }}
        run: |
          $ErrorActionPreference = 'Stop'
          $outFile = ".ci-logs\release-all-platforms\windows-x64\release-checksums.txt"
          $tag = $env:RELEASE_TAG_VAR
          $lines = @()
          $lines += "# ROX.ONE windows-x64 release $tag SHA-256 checksums"
          $lines += "# generated at $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)"
          $lines += "# WARNING: artifacts are NOT Authenticode-signed (rc.2 unsigned baseline)"
          $releaseDir = 'apps\electron\release'
          foreach ($pat in @('*.exe', '*.yml', '*.blockmap')) {
            $files = Get-ChildItem -Path $releaseDir -Filter $pat -ErrorAction SilentlyContinue
            foreach ($f in $files) {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLower()
              $lines += "$hash  $($f.Name)"
            }
          }
          $lines | Out-File -FilePath $outFile -Encoding utf8
          Get-Content $outFile

      # -----------------------------------------------------------------------
      # 11. Generate and upload CycloneDX SBOM (T508)
      #
      # cdxgen -t bun resolves the bun.lock dependency graph. The pinned
      # transient npx install avoids @latest drift without adding a production
      # dependency. Mac and Linux use bash; Windows uses bash (Git Bash / MSYS2
      # is available on windows-latest and npx is on PATH after setup-bun).
      # Each platform uploads its own named SBOM artifact (retention: 90 days).
      # -----------------------------------------------------------------------

      - name: Generate CycloneDX SBOM (Mac / Linux)
        if: matrix.platform == 'mac-arm64' || matrix.platform == 'linux-x64'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          SBOM_FILE="sbom-${PLATFORM}.json"
          npx -y @cyclonedx/cdxgen@12.4.0 -t bun -o "${SBOM_FILE}"
          bun run scripts/validate-sbom.ts "${SBOM_FILE}"
          echo "SBOM generated: $(wc -c < "${SBOM_FILE}") bytes"
          echo "SBOM_FILE=${SBOM_FILE}" >> "$GITHUB_ENV"

      - name: Generate CycloneDX SBOM (Windows)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: |
          set -euo pipefail
          npx -y @cyclonedx/cdxgen@12.4.0 -t bun -o sbom-windows-x64.json
          bun run scripts/validate-sbom.ts sbom-windows-x64.json
          echo "SBOM generated: $(wc -c < sbom-windows-x64.json) bytes"

      - name: Upload SBOM artifact (Mac ARM64)
        if: matrix.platform == 'mac-arm64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-mac-arm64-${{ env.RELEASE_TAG }}
          path: sbom-mac-arm64.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload SBOM artifact (Linux x64)
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-linux-x64-${{ env.RELEASE_TAG }}
          path: sbom-linux-x64.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload SBOM artifact (Windows x64)
        if: matrix.platform == 'windows-x64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-windows-x64-${{ env.RELEASE_TAG }}
          path: sbom-windows-x64.json
          if-no-files-found: error
          retention-days: 90

      # -----------------------------------------------------------------------
      # 12. Upload workflow artifacts (forensic trail — kept separate from release)
      # -----------------------------------------------------------------------

      - name: Upload Mac ARM64 workflow artifacts
        if: matrix.platform == 'mac-arm64' && success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-release-mac-arm64-${{ env.RELEASE_TAG }}
          path: |
            apps/electron/release/ROX-ONE-arm64.dmg
            apps/electron/release/ROX-ONE-arm64.zip
            apps/electron/release/*.blockmap
            apps/electron/release/latest-mac.yml
            .ci-logs/release-all-platforms/mac-arm64/release-checksums.txt
          retention-days: 30
          if-no-files-found: error

      - name: Upload Linux x64 workflow artifacts
        if: matrix.platform == 'linux-x64' && success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-release-linux-x64-${{ env.RELEASE_TAG }}
          path: |
            apps/electron/release/*.AppImage
            apps/electron/release/*.deb
            apps/electron/release/*.rpm
            .ci-logs/release-all-platforms/linux-x64/release-checksums.txt
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows x64 workflow artifacts
        if: matrix.platform == 'windows-x64' && success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-release-windows-x64-${{ env.RELEASE_TAG }}
          path: |
            apps/electron/release/*.exe
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap
            .ci-logs/release-all-platforms/windows-x64/release-checksums.txt
          retention-days: 30
          if-no-files-found: error

      # Upload CI evidence logs from all platforms (always, even on failure)
      - name: Upload CI evidence logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-release-evidence-${{ matrix.platform }}-${{ env.RELEASE_TAG }}
          path: |
            .ci-logs/release-all-platforms/${{ matrix.platform }}/**/*.log
            .ci-logs/release-all-platforms/${{ matrix.platform }}/release-checksums.txt
          retention-days: 30
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # 13. Publish to GitHub Release
      #
      # softprops/action-gh-release is idempotent on tag_name:
      #   - First matrix job to finish creates the draft release.
      #   - Subsequent jobs append their assets to the same release.
      # No job coordination is needed; the action handles concurrent writes.
      #
      # The release starts as a draft so the author can review, edit the notes,
      # and manually publish when ready. Set draft: false to auto-publish.
      # -----------------------------------------------------------------------

      # fail_on_unmatched_files is intentionally false on the per-platform
      # publishes: latest-mac.yml / latest.yml are only emitted by
      # electron-builder in signed-publish mode. The unsigned-RC baseline
      # doesn't produce them, and we want the publish step to succeed
      # regardless. The aggregate manifest.json attached by the
      # publish-manifest job carries equivalent metadata in unified form.

      - name: Publish Mac ARM64 artifacts to GitHub Release
        if: matrix.platform == 'mac-arm64' && success()
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
            apps/electron/release/latest-mac.yml
            apps/electron/release/*.blockmap

      - name: Publish Linux x64 artifacts to GitHub Release
        if: matrix.platform == 'linux-x64' && success()
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            apps/electron/release/*.AppImage
            apps/electron/release/*.deb
            apps/electron/release/*.rpm

      - name: Publish Windows x64 artifacts to GitHub Release
        if: matrix.platform == 'windows-x64' && success()
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            apps/electron/release/*.exe
            apps/electron/release/latest.yml
            apps/electron/release/*.blockmap

  # ---------------------------------------------------------------------------
  # Aggregate manifest job
  #
  # Runs after all three matrix legs succeed. Downloads each platform's
  # workflow artifacts, computes SHA-256 over canonical bytes, and writes a
  # single manifest.json keyed by platform (darwin-arm64, linux-x64, win32-x64)
  # that mirrors the shape produced by scripts/upload.ts. The manifest is
  # attached to the same GitHub release as a normal asset, so the Cloudflare
  # release-feed worker can proxy it without per-tag redeploys.
  #
  # Selection rules (mirroring scripts/upload.ts:inferBinaryEntry):
  #   - darwin: prefer .zip over .dmg (zip is what electron-updater consumes)
  #   - linux:  pick the .AppImage (deb/rpm ignored from "latest" pointer)
  #   - win:    pick the .exe
  #
  # Skips if any platform job failed — partial manifests are worse than no
  # manifest (the Cloudflare worker falls back to whatever it served before).
  # ---------------------------------------------------------------------------
  publish-manifest:
    name: Publish aggregate manifest
    needs: build-and-release
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_TAG}" ]; then
            CANDIDATE="${DISPATCH_TAG#refs/tags/}"
          else
            CANDIDATE="${REF_NAME#refs/tags/}"
          fi
          if [[ ! "${CANDIDATE}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "::error::release tag '${CANDIDATE}' does not match v[0-9]+.[0-9]+.[0-9]+(-rc.[0-9]+)?"
            exit 1
          fi
          echo "RELEASE_TAG=${CANDIDATE}" >> "$GITHUB_ENV"
          echo "tag=${CANDIDATE}" >> "$GITHUB_OUTPUT"

      - name: Download Mac ARM64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rox-one-release-mac-arm64-${{ env.RELEASE_TAG }}
          path: .manifest-bin/mac-arm64

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rox-one-release-linux-x64-${{ env.RELEASE_TAG }}
          path: .manifest-bin/linux-x64

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rox-one-release-windows-x64-${{ env.RELEASE_TAG }}
          path: .manifest-bin/windows-x64

      - name: Build aggregate manifest.json
        shell: bash
        env:
          PUBLIC_VERSIONS_URL: https://app.rox.one/electron
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"

          # actions/upload-artifact@v4 preserves repo-relative paths inside the
          # archive (e.g. apps/electron/release/ROX-ONE-arm64.zip), so files
          # land at .manifest-bin/<plat>/apps/electron/release/* after download.
          # Use `find` rather than shell globs to be robust to that depth.
          # Sort output for deterministic selection across filesystems and
          # exclude blockmap/checksum sidecars that might share an extension.
          pick_one() {
            local dir="$1" pattern="$2"
            find "$dir" -type f -name "$pattern" \
              ! -name "*.blockmap" \
              -print | LC_ALL=C sort | head -n 1
          }

          MAC_FILE=$(pick_one   .manifest-bin/mac-arm64   'ROX-ONE-*.zip')
          LINUX_FILE=$(pick_one .manifest-bin/linux-x64   'ROX-ONE-*.AppImage')
          WIN_FILE=$(pick_one   .manifest-bin/windows-x64 'ROX-ONE-*.exe')

          if [ -z "$MAC_FILE" ];   then echo "::error::no ROX-ONE-*.zip in mac-arm64 artifact";        exit 1; fi
          if [ -z "$LINUX_FILE" ]; then echo "::error::no ROX-ONE-*.AppImage in linux-x64 artifact";   exit 1; fi
          if [ -z "$WIN_FILE" ];   then echo "::error::no ROX-ONE-*.exe in windows-x64 artifact";      exit 1; fi

          mac_name=$(basename "$MAC_FILE")
          linux_name=$(basename "$LINUX_FILE")
          win_name=$(basename "$WIN_FILE")

          mac_sha=$(sha256sum "$MAC_FILE"     | awk '{print $1}')
          linux_sha=$(sha256sum "$LINUX_FILE" | awk '{print $1}')
          win_sha=$(sha256sum "$WIN_FILE"     | awk '{print $1}')

          mac_size=$(stat -c%s "$MAC_FILE")
          linux_size=$(stat -c%s "$LINUX_FILE")
          win_size=$(stat -c%s "$WIN_FILE")

          # Avoid GNU-only date %3N: emit second precision in the ISO string
          # and millisecond precision in the timestamp via python (portable).
          build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          build_ts=$(python3 -c 'import time; print(int(time.time()*1000))')

          # Build JSON with jq so filenames containing quotes, backslashes, or
          # other JSON-meaningful characters are correctly escaped. Sizes are
          # cast to numbers via `tonumber`.
          mkdir -p .manifest-out
          jq -n \
            --arg version "$VERSION" \
            --arg build_time "$build_time" \
            --argjson build_timestamp "$build_ts" \
            --arg base_url "$PUBLIC_VERSIONS_URL" \
            --arg mac_name "$mac_name" --arg mac_sha "$mac_sha" --argjson mac_size "$mac_size" \
            --arg linux_name "$linux_name" --arg linux_sha "$linux_sha" --argjson linux_size "$linux_size" \
            --arg win_name "$win_name" --arg win_sha "$win_sha" --argjson win_size "$win_size" \
            '{
              version: $version,
              build_time: $build_time,
              build_timestamp: $build_timestamp,
              binaries: {
                "darwin-arm64": { url: ($base_url + "/latest/" + $mac_name),   sha256: $mac_sha,   size: $mac_size,   filename: $mac_name },
                "linux-x64":   { url: ($base_url + "/latest/" + $linux_name), sha256: $linux_sha, size: $linux_size, filename: $linux_name },
                "win32-x64":   { url: ($base_url + "/latest/" + $win_name),   sha256: $win_sha,   size: $win_size,   filename: $win_name }
              }
            }' > .manifest-out/manifest.json

          echo "--- manifest.json ---"
          cat .manifest-out/manifest.json

          # Final sanity check (jq already validates, but be explicit).
          jq -e . .manifest-out/manifest.json > /dev/null

      - name: Upload manifest as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rox-one-release-manifest-${{ env.RELEASE_TAG }}
          path: .manifest-out/manifest.json
          retention-days: 30
          if-no-files-found: error

      - name: Write step summary
        shell: bash
        run: |
          set -euo pipefail
          manifest=.manifest-out/manifest.json
          version=$(jq -r '.version' "$manifest")
          {
            echo "## ROX ONE release manifest — \`${RELEASE_TAG}\`"
            echo ""
            echo "- **Live URL:** https://app.rox.one/electron/latest/manifest.json"
            echo "- **Pinned URL:** https://app.rox.one/electron/${version}/manifest.json"
            echo "- **GitHub Release asset:** \`manifest.json\` on the \`${RELEASE_TAG}\` draft"
            echo ""
            echo "| Platform | Filename | Size | SHA-256 |"
            echo "|----------|----------|-----:|---------|"
            jq -r '
              .binaries
              | to_entries[]
              | "| \(.key) | `\(.value.filename)` | \(.value.size) B | `\(.value.sha256)` |"
            ' "$manifest"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attach manifest.json to GitHub Release
        # generate_release_notes is intentionally false here: the matrix legs
        # already populated the release notes; re-generating from this last
        # job would clobber any human edits made between jobs.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: .manifest-out/manifest.json

      # Best-effort live-feed smoke check. Skipped when the release is left as
      # a draft (the worker would 404 because the release isn't reachable via
      # the public latest endpoint until it's published). Also skipped if the
      # release was just attached — the Cloudflare worker caches the latest
      # tag for 60s, so a sub-minute check would race against staleness.
      #
      # To enable: set repository variable ROX_LIVE_SMOKE_CHECK=true. Off by
      # default so PR-triggered manual runs don't depend on Cloudflare.
      - name: Live feed smoke check (optional)
        # Only meaningful on tag-push events that auto-publish: workflow_dispatch
        # runs typically target a draft tag that humans publish later, in which
        # case the public `latest` endpoint stays on the previous release and
        # the smoke would always warn.
        if: vars.ROX_LIVE_SMOKE_CHECK == 'true' && github.event_name == 'push'
        shell: bash
        env:
          MANIFEST_URL: https://app.rox.one/electron/latest/manifest.json
        run: |
          set -euo pipefail
          local_version=$(jq -r '.version' .manifest-out/manifest.json)
          # Give the worker cache (60s TTL) a chance to expire; also wait for
          # the user to publish the draft. 90s is the smallest value that
          # covers the 60s TTL with margin without making CI feel sluggish.
          echo "Waiting 90s for worker cache to expire and draft publish window..."
          sleep 90

          for attempt in 1 2 3 4 5; do
            live_version=$(curl -sf "$MANIFEST_URL" | jq -r '.version' || true)
            if [ "$live_version" = "$local_version" ]; then
              echo "::notice::Live manifest matches local: v${live_version}"
              exit 0
            fi
            echo "Attempt ${attempt}: live=${live_version:-<unreachable>} expected=${local_version}, retrying..."
            sleep 30
          done

          # Don't fail the workflow — the release artifacts are already on
          # GitHub. Just surface a warning so the publisher knows the live
          # feed didn't catch up.
          echo "::warning::Live manifest at $MANIFEST_URL did not match local v${local_version} after 5 attempts. Check Cloudflare worker and that the release draft was published."

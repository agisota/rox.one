name: Private Release Candidate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/private-release.yml"
      - ".github/workflows/mac-arm-build.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/**"
      - "docs/release/**"
      - "docs/tickets/**"
      - "docs/worklog/**"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
      - "mac/**"
    paths:
      - ".github/workflows/private-release.yml"
      - ".github/workflows/mac-arm-build.yml"
      - "apps/electron/**"
      - "packages/**"
      - "scripts/**"
      - "docs/release/**"
      - "docs/tickets/**"
      - "docs/worklog/**"
      - "package.json"
      - "bun.lock"

concurrency:
  group: private-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  private-release:
    name: ROX ONE private release gate
    runs-on: macos-15
    timeout-minutes: 75
    env:
      CRAFT_E2E_FAKE_PROVIDERS: "1"
      CRAFT_HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare private release logs
        run: mkdir -p .ci-logs/private-release

      - name: Validate private release pipeline contract
        shell: bash
        run: |
          set -o pipefail
          bun run validate:private-release-pipeline 2>&1 | tee .ci-logs/private-release/pipeline-contract.log

      - name: Validate docs
        shell: bash
        run: |
          set -o pipefail
          bun run validate:docs 2>&1 | tee .ci-logs/private-release/docs.log

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee .ci-logs/private-release/lint.log

      - name: Typecheck all packages
        shell: bash
        run: |
          set -o pipefail
          bun run typecheck:all 2>&1 | tee .ci-logs/private-release/typecheck.log

      - name: Run deterministic test suite
        shell: bash
        run: |
          set -o pipefail
          bun test 2>&1 | tee .ci-logs/private-release/tests.log

      - name: Build Electron app
        shell: bash
        run: |
          set -o pipefail
          bun run electron:build 2>&1 | tee .ci-logs/private-release/electron-build.log

      - name: Validate bundle policy
        shell: bash
        run: |
          set -o pipefail
          bun run validate:bundle-policy 2>&1 | tee .ci-logs/private-release/bundle-policy.log

      - name: Validate Mac ARM workflow contract
        shell: bash
        run: |
          set -o pipefail
          bun run validate:mac-arm-build-workflow 2>&1 | tee .ci-logs/private-release/mac-arm-workflow.log

      - name: Upload private release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rox-one-private-release-evidence
          path: |
            .ci-logs/private-release/**/*.log
            apps/electron/dist
            docs/release
          retention-days: 14
          if-no-files-found: error

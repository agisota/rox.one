name: Bundle Budget

on:
  pull_request:
    paths:
      - 'apps/electron/**'
      - 'packages/design-*/**'
      - 'bundle-budget.json'
      - 'scripts/validate-bundle-budget.ts'
      - 'scripts/electron-build*.ts'
      - '.github/workflows/bundle-budget.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/electron/**'
      - 'packages/design-*/**'
      - 'bundle-budget.json'
      - 'scripts/validate-bundle-budget.ts'
      - 'scripts/electron-build*.ts'
      - '.github/workflows/bundle-budget.yml'

concurrency:
  group: bundle-budget-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build renderer
        run: bun run electron:build:renderer

      - name: Check bundle budget
        run: bun run bundle:budget

      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-stats
          path: apps/electron/dist/renderer/
          if-no-files-found: warn

name: Secret Scan

# Implements the user engineering rule:
#   "Secret leak scan: run trufflehog/gitleaks before each push."
# Uses the official gitleaks-action@v2 which provides:
#   - Hard failure (exit 1) on any detected secret -- no soft-fail.
#   - Secret values redacted from log output.
#   - Automatic pickup of .gitleaks.toml if present in the repo root.
#   - SARIF report upload to GitHub Security tab (requires security-events: write).
#
# Gitleaks rule set: built-in default rules (covers AWS keys, GCP credentials,
# GitHub tokens, private keys, generic high-entropy strings, and 100+ more patterns).
# To extend or suppress rules, add a .gitleaks.toml at the repo root.
#
# NOTE: GitHub Actions billing is currently blocked on this repo.
# This workflow is correctly configured and will run once billing is restored.

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for SARIF upload to GitHub Security tab
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans all commits in a PR branch,
          # not just the merge commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for GitHub org accounts.
          # Set this as a repo secret if the repo moves to an org.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # gitleaks-action behaviour:
        #   --redact        mask detected secret values in output
        #   --no-banner     suppress ASCII art header
        #   exit code 1     on any finding -- blocks merge
